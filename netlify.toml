[build]
  command = "npm run build"
  publish = "out"
  # Deploys are driven by GitHub Actions — disable Netlify git-triggered builds
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/ai-teams"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/2011/02/07/apache-ant-junit-xml-schema/"
  to = "/blog/apache-ant-junit-xml-schema"
  status = 301

# Slugify config switched to strict on 2026-04-28. The apostrophe-bearing form
# was the canonical URL between this article's ship date and the switch.
# Keep this redirect durable so external links (RSS, social, archives) resolve.
[[redirects]]
  from = "/blog/your-ai-agent-doesn't-know-when-to-stop-committing"
  to = "/blog/your-ai-agent-doesnt-know-when-to-stop-committing"
  status = 301
