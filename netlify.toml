[build]
  command = "npm run build"
  publish = "out"
  # Deploys are driven by GitHub Actions — disable Netlify git-triggered builds
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/ai-teams"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/2011/02/07/apache-ant-junit-xml-schema/"
  to = "/blog/apache-ant-junit-xml-schema"
  status = 301
