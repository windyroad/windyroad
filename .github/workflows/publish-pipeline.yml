name: publish-pipeline

on:
  push:
    branches: [publish]

jobs:
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    outputs:
      deploy_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Find release preview run
        id: find-preview
        run: |
          RUN_ID=$(gh run list \
            --workflow=release-pr-preview.yml \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')
          [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ] || { echo "No successful preview run found"; exit 1; }
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build from release preview
        uses: actions/download-artifact@v8
        with:
          name: release-preview-build
          path: out/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find-preview.outputs.run_id }}

      - name: Deploy to Netlify production
        id: deploy
        run: |
          OUTPUT=$(npx netlify deploy --dir=out --prod --json --message "publish-${{ github.sha }}")
          echo "url=$(echo "$OUTPUT" | jq -r '.deploy_url')" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Smoke test production
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Testing $URL"

          STATUS=$(curl -sS -L -o /tmp/home.html -w "%{http_code}" --connect-timeout 15 --max-time 30 "$URL/")
          [ "$STATUS" = "200" ] || { echo "Homepage returned $STATUS"; exit 1; }
          grep -q "Tom Howard" /tmp/home.html || { echo "Homepage missing expected content"; exit 1; }

          STATUS=$(curl -sS -L -o /dev/null -w "%{http_code}" --connect-timeout 15 --max-time 30 "$URL/blog/")
          [ "$STATUS" = "200" ] || { echo "/blog/ returned $STATUS"; exit 1; }

          STATUS=$(curl -sS -L -o /dev/null -w "%{http_code}" --connect-timeout 15 --max-time 30 "$URL/vibe-code-audit/")
          [ "$STATUS" = "200" ] || { echo "/vibe-code-audit/ returned $STATUS"; exit 1; }

      # Merge back to master is handled by release:watch running locally,
      # which uses push:watch to ensure the master pipeline stays green.
