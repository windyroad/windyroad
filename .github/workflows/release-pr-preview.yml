name: release-pr-preview

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Release PR number
        required: true
        type: string
      pr_head_sha:
        description: PR head commit SHA
        required: true
        type: string

jobs:
  preview:
    name: Deploy preview + smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.pr_head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview to Netlify
        id: deploy
        run: |
          OUTPUT=$(npx netlify deploy --dir=out --json --message "release-pr-${{ github.event.inputs.pr_number }}")
          echo "url=$(echo "$OUTPUT" | jq -r '.deploy_url')" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Smoke test preview
        run: |
          URL="${{ steps.deploy.outputs.url }}"

          STATUS=$(curl -sS -o /tmp/home.html -w "%{http_code}" "$URL/")
          [ "$STATUS" = "200" ]
          grep -q "Tom Howard" /tmp/home.html

          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$URL/blog/")
          [ "$STATUS" = "200" ]

          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$URL/vibe-code-audit/")
          [ "$STATUS" = "200" ]

      - name: Comment preview URL on PR
        run: |
          gh pr comment ${{ github.event.inputs.pr_number }} \
            --body "**Preview ready:** ${{ steps.deploy.outputs.url }}

          Smoke tests passed. Open the preview, use the site, merge when satisfied."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report check status on PR
        if: always()
        run: |
          STATE=${{ job.status == 'success' && 'success' || 'failure' }}
          gh api repos/${{ github.repository }}/statuses/${{ github.event.inputs.pr_head_sha }} \
            -f state="$STATE" \
            -f context="release-pr-preview" \
            -f description="Preview deploy and smoke tests"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
