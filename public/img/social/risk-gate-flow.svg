<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">PreToolUse risk gate flow</title>
  <desc id="svg-desc">Five-step horizontal flow showing how the risk gate intercepts a pipeline action. Step 1: agent forms intent, with three example pipeline actions shown as code chips: git commit, git push, and gh pr merge for release. Step 2: PreToolUse hook intercepts the call. Step 3: hook checks the session-scoped score file. From the check, two branches: PERMIT branch goes up to "action runs"; DENY branch goes down to delegate to the risk-scorer subagent. Step 4 (deny branch): risk-scorer reads the diff and conversation, scores against RISK-POLICY.md, and writes the score file. Step 5: deny branch loops back to step 3 for re-evaluation. The deny path is highlighted in red; the permit path is a single green line.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  <rect x="0" y="0" width="1200" height="4" fill="#3B82F6"/>

  <!-- Header -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#F1F5F9">PreToolUse risk gate</text>
  <text x="600" y="78" text-anchor="middle" font-size="15" fill="#94A3B8">Hook intercepts every tool call. The score check decides.</text>

  <!-- ===== STEP 1: Agent intent ===== -->
  <text x="140" y="128" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em">1. AGENT INTENT</text>
  <rect x="60" y="142" width="200" height="146" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>

  <!-- Code chips inside agent intent box -->
  <rect x="76" y="160" width="168" height="32" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="160" y="180" text-anchor="middle" font-size="12" fill="#93C5FD" class="mono">git commit</text>

  <rect x="76" y="200" width="168" height="32" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="160" y="220" text-anchor="middle" font-size="12" fill="#93C5FD" class="mono">git push</text>

  <rect x="76" y="240" width="168" height="32" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="160" y="260" text-anchor="middle" font-size="12" fill="#93C5FD" class="mono">gh pr merge</text>

  <!-- Arrow 1→2 -->
  <line x1="270" y1="215" x2="334" y2="215" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow-grey)"/>

  <!-- ===== STEP 2: PreToolUse hook ===== -->
  <text x="424" y="128" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em">2. HOOK INTERCEPTS</text>
  <rect x="344" y="172" width="200" height="86" rx="8" fill="#1E2940" stroke="#3B82F650" stroke-width="1.5"/>
  <text x="444" y="200" text-anchor="middle" font-size="14" font-weight="600" fill="#93C5FD">PreToolUse hook</text>
  <text x="444" y="222" text-anchor="middle" font-size="11" fill="#94A3B8">on Bash | Edit | Write</text>
  <text x="444" y="242" text-anchor="middle" font-size="11" fill="#64748B" class="mono">regex match action</text>

  <!-- Arrow 2→3 -->
  <line x1="554" y1="215" x2="618" y2="215" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow-grey)"/>

  <!-- ===== STEP 3: Score check (decision) ===== -->
  <text x="708" y="128" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em">3. SCORE CHECK</text>
  <rect x="628" y="142" width="200" height="146" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="728" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#F1F5F9">check_risk_gate</text>
  <text x="728" y="182" text-anchor="middle" font-size="10" fill="#64748B">(fail-closed)</text>

  <line x1="648" y1="194" x2="808" y2="194" stroke="#334155" stroke-width="1"/>
  <text x="728" y="212" text-anchor="middle" font-size="11" fill="#94A3B8">1. exists?</text>
  <text x="728" y="228" text-anchor="middle" font-size="11" fill="#94A3B8">2. fresh?  (TTL 1h)</text>
  <text x="728" y="244" text-anchor="middle" font-size="11" fill="#94A3B8">3. drift?  (state hash)</text>
  <text x="728" y="260" text-anchor="middle" font-size="11" fill="#94A3B8">4. valid?</text>
  <text x="728" y="276" text-anchor="middle" font-size="11" fill="#94A3B8">5. residual &lt; 5?</text>

  <!-- Arrow 3 → permit (up + right, lands on Action runs box at y=172) -->
  <path d="M 838 195 L 870 195 L 870 172 L 898 172" stroke="#22C55E" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>

  <!-- PERMIT label -->
  <text x="870" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#4ADE80" letter-spacing="0.08em">PERMIT</text>

  <!-- Arrow 3 → deny (right + down + right, enters left edge of risk-scorer subagent box at y=370) -->
  <path d="M 838 235 L 870 235 L 870 370 L 898 370" stroke="#EF4444" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- DENY label -->
  <text x="878" y="320" font-size="10" font-weight="700" fill="#F87171" letter-spacing="0.08em">DENY</text>

  <!-- ===== PERMIT branch: Action runs ===== -->
  <rect x="900" y="142" width="220" height="60" rx="8" fill="#0A2E18" stroke="#22C55E" stroke-width="1.5"/>
  <text x="1010" y="168" text-anchor="middle" font-size="14" font-weight="600" fill="#4ADE80">Action runs</text>
  <text x="1010" y="188" text-anchor="middle" font-size="11" fill="#86EFAC90">commit, push, or release proceeds</text>

  <!-- ===== DENY branch: risk-scorer subagent ===== -->
  <text x="1010" y="338" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em" text-anchor="middle">4. RISK-SCORER SUBAGENT</text>
  <rect x="900" y="352" width="220" height="100" rx="8" fill="#2A0F12" stroke="#7F1D1D" stroke-width="1.5"/>
  <text x="1010" y="377" text-anchor="middle" font-size="13" font-weight="600" fill="#FCA5A5">wr-risk-scorer:pipeline</text>
  <text x="1010" y="397" text-anchor="middle" font-size="11" fill="#FCA5A580">reads diff + conversation</text>
  <text x="1010" y="415" text-anchor="middle" font-size="11" fill="#FCA5A580">scores impact &#215; likelihood</text>
  <text x="1010" y="433" text-anchor="middle" font-size="11" fill="#FCA5A580">against RISK-POLICY.md</text>

  <!-- Arrow scorer → score file -->
  <line x1="900" y1="402" x2="836" y2="402" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow-grey)"/>

  <!-- ===== STEP 5: Score file written ===== -->
  <text x="728" y="338" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em" text-anchor="middle">5. SCORE WRITTEN</text>
  <rect x="628" y="352" width="200" height="100" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="728" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#F1F5F9">Score file</text>
  <text x="728" y="396" text-anchor="middle" font-size="10" fill="#64748B" class="mono">${TMPDIR}/claude-risk-${sid}/</text>
  <text x="728" y="416" text-anchor="middle" font-size="11" fill="#94A3B8">+ state-hash</text>
  <text x="728" y="434" text-anchor="middle" font-size="11" fill="#94A3B8">+ TTL stamp</text>

  <!-- Loop arrow: score written → back to score check -->
  <path d="M 628 380 L 588 380 L 588 215 L 624 215" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-grey)"/>
  <text x="556" y="300" font-size="10" font-weight="600" fill="#60A5FA" text-anchor="middle">re-check</text>
  <text x="556" y="313" font-size="10" font-weight="600" fill="#60A5FA" text-anchor="middle">on next attempt</text>

  <!-- Separator -->
  <line x1="60" y1="490" x2="1140" y2="490" stroke="#1E293B" stroke-width="1.5"/>

  <!-- ===== Legend ===== -->
  <text x="60" y="518" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em">LEGEND</text>

  <rect x="60" y="532" width="68" height="24" rx="12" fill="#0A2E18" stroke="#22C55E" stroke-width="1.5"/>
  <text x="94" y="548" text-anchor="middle" font-size="10" font-weight="700" fill="#4ADE80">PERMIT</text>
  <text x="140" y="548" font-size="12" fill="#94A3B8">Score below threshold. Action runs.</text>

  <rect x="60" y="566" width="68" height="24" rx="12" fill="#3B0E0E" stroke="#EF4444" stroke-width="1.5"/>
  <text x="94" y="582" text-anchor="middle" font-size="10" font-weight="700" fill="#F87171">DENY</text>
  <text x="140" y="582" font-size="12" fill="#94A3B8">Score missing, expired, drifted, or above threshold</text>

  <text x="600" y="610" text-anchor="middle" font-size="12" fill="#64748B">Block threshold: residual score &#8805; 5 (Medium band) &#8226; State hash invalidates the score when the diff changes</text>
</svg>
