<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">Anatomy of a risk score</title>
  <desc id="svg-desc">A single risk-item card titled commit removes production database volume. Two columns inside the card. Left column shows inherent risk: impact 5 (Severe), likelihood 5 (Almost certain), inherent risk 25 of 25 (Very High). Right column shows controls: none named, with explanatory notes that no paired migration is in the diff, no backup snapshot is referenced, no incident ticket links the change to approval. A red verdict bar across the bottom of the card states residual 25 of 25, block threshold residual greater than or equal to 5, verdict DENY. Below the card, a four-line legend: impact comes from RISK-POLICY.md, likelihood comes from RISK-POLICY.md, controls must be named with file path and scenario, threshold comes from policy not the agent.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  <rect x="0" y="0" width="1200" height="4" fill="#3B82F6"/>

  <!-- Header -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#F1F5F9">Anatomy of a risk score</text>
  <text x="600" y="78" text-anchor="middle" font-size="15" fill="#94A3B8">How the gate decides DENY</text>

  <!-- ===== Risk-item card ===== -->
  <rect x="100" y="110" width="1000" height="368" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>

  <!-- Card title bar -->
  <rect x="100" y="110" width="1000" height="56" rx="12" fill="#0F172A"/>
  <rect x="100" y="148" width="1000" height="18" fill="#0F172A"/>
  <line x1="100" y1="166" x2="1100" y2="166" stroke="#334155" stroke-width="1"/>

  <text x="124" y="135" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em">RISK ITEM &#8226; COMMIT</text>
  <text x="124" y="158" font-size="20" font-weight="700" fill="#F1F5F9" class="mono">remove prod-pg-volume from infra/railway.ts</text>
  <text x="1076" y="148" text-anchor="end" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em">RESIDUAL</text>
  <text x="1076" y="158" text-anchor="end" font-size="14" font-weight="700" fill="#F87171">25 / 25</text>

  <!-- Inner column divider -->
  <line x1="600" y1="180" x2="600" y2="394" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- LEFT COLUMN: Inherent risk -->
  <text x="124" y="206" font-size="11" font-weight="600" fill="#F87171" letter-spacing="0.10em">INHERENT RISK</text>

  <!-- Impact row -->
  <text x="124" y="246" font-size="13" fill="#94A3B8">Impact</text>
  <rect x="370" y="228" width="206" height="32" rx="6" fill="#2A0F12" stroke="#7F1D1D" stroke-width="1"/>
  <text x="473" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#FCA5A5">5 &#8226; Severe</text>

  <!-- Likelihood row -->
  <text x="124" y="284" font-size="13" fill="#94A3B8">Likelihood</text>
  <rect x="370" y="266" width="206" height="32" rx="6" fill="#2A0F12" stroke="#7F1D1D" stroke-width="1"/>
  <text x="473" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#FCA5A5">5 &#8226; Almost certain</text>

  <!-- Computed inherent -->
  <line x1="124" y1="312" x2="576" y2="312" stroke="#1E293B" stroke-width="1"/>
  <text x="124" y="338" font-size="13" font-weight="600" fill="#F1F5F9">Inherent risk</text>
  <text x="124" y="356" font-size="11" fill="#64748B" class="mono">5 &#215; 5 = 25 / 25</text>
  <rect x="370" y="320" width="206" height="48" rx="8" fill="#3B0E0E" stroke="#EF4444" stroke-width="1.5"/>
  <text x="473" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#F87171">25 / 25</text>
  <text x="473" y="361" text-anchor="middle" font-size="11" fill="#FCA5A580">Very High</text>

  <!-- RIGHT COLUMN: Controls -->
  <text x="624" y="206" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="0.10em">CONTROLS &#8226; NAMED, SPECIFIC</text>

  <rect x="624" y="220" width="452" height="48" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="850" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#94A3B8">None named</text>
  <text x="850" y="262" text-anchor="middle" font-size="11" fill="#64748B">No control reduces inherent risk.</text>

  <!-- Missing-control list -->
  <text x="624" y="296" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.08em">WHAT WOULD COUNT (ABSENT HERE)</text>

  <text x="624" y="320" font-size="13" fill="#94A3B8">&#9679; Paired migration</text>
  <text x="800" y="320" font-size="11" fill="#64748B">data move before delete</text>

  <text x="624" y="342" font-size="13" fill="#94A3B8">&#9679; Backup snapshot</text>
  <text x="800" y="342" font-size="11" fill="#64748B">referenced in changeset</text>

  <text x="624" y="364" font-size="13" fill="#94A3B8">&#9679; Incident ticket</text>
  <text x="800" y="364" font-size="11" fill="#64748B">linking change to approval</text>

  <!-- Verdict bar across bottom of card -->
  <rect x="100" y="410" width="1000" height="68" rx="0" fill="#3B0E0E"/>
  <rect x="100" y="410" width="1000" height="68" fill="none" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="100" y1="410" x2="100" y2="478" stroke="#EF4444" stroke-width="6"/>

  <text x="142" y="438" font-size="11" font-weight="600" fill="#FCA5A580" letter-spacing="0.10em">RESIDUAL</text>
  <text x="142" y="462" font-size="20" font-weight="700" fill="#F87171">25 / 25</text>

  <text x="372" y="438" font-size="11" font-weight="600" fill="#FCA5A580" letter-spacing="0.10em">BLOCK THRESHOLD</text>
  <text x="372" y="462" font-size="16" font-weight="600" fill="#FCA5A5">residual &#8805; 5  (Medium band)</text>

  <text x="864" y="438" font-size="11" font-weight="600" fill="#FCA5A580" letter-spacing="0.10em">VERDICT</text>
  <text x="864" y="464" font-size="26" font-weight="700" fill="#EF4444">DENY</text>

  <!-- ===== Legend ===== -->
  <text x="100" y="514" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.10em">WHERE EACH VALUE COMES FROM</text>

  <text x="100" y="542" font-size="13" fill="#94A3B8">
    <tspan font-weight="700" fill="#F1F5F9">1.</tspan>
    <tspan dx="6">Impact</tspan>
    <tspan dx="4" fill="#64748B">&#8594; RISK-POLICY.md (1 Negligible to 5 Severe)</tspan>
  </text>
  <text x="100" y="562" font-size="13" fill="#94A3B8">
    <tspan font-weight="700" fill="#F1F5F9">2.</tspan>
    <tspan dx="6">Likelihood</tspan>
    <tspan dx="4" fill="#64748B">&#8594; RISK-POLICY.md (1 Rare to 5 Almost certain)</tspan>
  </text>
  <text x="600" y="542" font-size="13" fill="#94A3B8">
    <tspan font-weight="700" fill="#F1F5F9">3.</tspan>
    <tspan dx="6">Controls</tspan>
    <tspan dx="4" fill="#64748B">&#8594; must be named (file path, scenario)</tspan>
  </text>
  <text x="600" y="562" font-size="13" fill="#94A3B8">
    <tspan font-weight="700" fill="#F1F5F9">4.</tspan>
    <tspan dx="6">Threshold</tspan>
    <tspan dx="4" fill="#64748B">&#8594; policy, not the agent</tspan>
  </text>

  <!-- Footer -->
  <text x="600" y="600" text-anchor="middle" font-size="12" fill="#64748B">A score is impact &#215; likelihood, less control credit. The agent does not pick the threshold.</text>
</svg>
