<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  <rect x="0" y="0" width="1200" height="4" fill="#3B82F6"/>

  <!-- Header -->
  <text x="600" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#F1F5F9">Three levels of pipeline enforcement</text>
  <text x="600" y="90" text-anchor="middle" font-size="17" fill="#94A3B8">Deny shortcuts. Confirm releases. The hook decides.</text>

  <!-- Divider under header -->
  <line x1="80" y1="114" x2="1120" y2="114" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Column headers -->
  <text x="220" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#64748B" letter-spacing="0.08em">COMMAND</text>
  <text x="540" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#64748B" letter-spacing="0.08em">HOOK ACTION</text>
  <text x="900" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#64748B" letter-spacing="0.08em">OUTCOME</text>

  <!-- ===== ROW 1: git push → DENY → redirects to push:watch ===== -->

  <!-- Command box -->
  <rect x="80" y="174" width="280" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="220" y="199" text-anchor="middle" font-size="13" fill="#94A3B8">Claude runs</text>
  <text x="220" y="220" text-anchor="middle" font-size="17" font-weight="600" fill="#F1F5F9" class="mono">git push</text>

  <!-- Arrow to action -->
  <line x1="360" y1="204" x2="430" y2="204" stroke="#475569" stroke-width="2"/>
  <polygon points="438,204 426,198 426,210" fill="#475569"/>

  <!-- DENY badge -->
  <rect x="438" y="182" width="204" height="44" rx="22" fill="#EF444420" stroke="#EF444470" stroke-width="1.5"/>
  <text x="540" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#EF4444">DENY</text>

  <!-- Arrow to outcome -->
  <line x1="642" y1="204" x2="712" y2="204" stroke="#EF4444" stroke-width="2"/>
  <polygon points="720,204 708,198 708,210" fill="#EF4444"/>

  <!-- Outcome box -->
  <rect x="720" y="174" width="360" height="60" rx="8" fill="#1E2940" stroke="#3B82F650" stroke-width="1.5"/>
  <text x="900" y="199" text-anchor="middle" font-size="13" fill="#94A3B8">redirects to</text>
  <text x="900" y="220" text-anchor="middle" font-size="16" font-weight="600" fill="#93C5FD" class="mono">npm run push:watch</text>

  <!-- ===== ROW 2: gh pr merge → DENY → redirects to release:watch ===== -->

  <!-- Command box -->
  <rect x="80" y="266" width="280" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="220" y="291" text-anchor="middle" font-size="13" fill="#94A3B8">Claude runs</text>
  <text x="220" y="312" text-anchor="middle" font-size="17" font-weight="600" fill="#F1F5F9" class="mono">gh pr merge</text>

  <!-- Arrow to action -->
  <line x1="360" y1="296" x2="430" y2="296" stroke="#475569" stroke-width="2"/>
  <polygon points="438,296 426,290 426,302" fill="#475569"/>

  <!-- DENY badge -->
  <rect x="438" y="274" width="204" height="44" rx="22" fill="#EF444420" stroke="#EF444470" stroke-width="1.5"/>
  <text x="540" y="302" text-anchor="middle" font-size="15" font-weight="700" fill="#EF4444">DENY</text>

  <!-- Arrow to outcome -->
  <line x1="642" y1="296" x2="712" y2="296" stroke="#EF4444" stroke-width="2"/>
  <polygon points="720,296 708,290 708,302" fill="#EF4444"/>

  <!-- Outcome box -->
  <rect x="720" y="266" width="360" height="60" rx="8" fill="#1E2940" stroke="#3B82F650" stroke-width="1.5"/>
  <text x="900" y="291" text-anchor="middle" font-size="13" fill="#94A3B8">redirects to</text>
  <text x="900" y="312" text-anchor="middle" font-size="16" font-weight="600" fill="#93C5FD" class="mono">npm run release:watch</text>

  <!-- ===== ROW 3: release:watch → ASK → human confirms ===== -->

  <!-- Command box -->
  <rect x="80" y="358" width="280" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="220" y="383" text-anchor="middle" font-size="13" fill="#94A3B8">Claude runs</text>
  <text x="220" y="404" text-anchor="middle" font-size="16" font-weight="600" fill="#F1F5F9" class="mono">npm run release:watch</text>

  <!-- Arrow to action -->
  <line x1="360" y1="388" x2="430" y2="388" stroke="#475569" stroke-width="2"/>
  <polygon points="438,388 426,382 426,394" fill="#475569"/>

  <!-- ASK badge -->
  <rect x="438" y="366" width="204" height="44" rx="22" fill="#F59E0B20" stroke="#F59E0B70" stroke-width="1.5"/>
  <text x="540" y="394" text-anchor="middle" font-size="15" font-weight="700" fill="#F59E0B">ASK</text>

  <!-- Arrow to outcome -->
  <line x1="642" y1="388" x2="712" y2="388" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="720,388 708,382 708,394" fill="#F59E0B"/>

  <!-- Outcome box -->
  <rect x="720" y="358" width="360" height="60" rx="8" fill="#1A2A10" stroke="#22C55E50" stroke-width="1.5"/>
  <text x="900" y="383" text-anchor="middle" font-size="13" fill="#94A3B8">human confirms, then runs</text>
  <text x="900" y="404" text-anchor="middle" font-size="16" font-weight="600" fill="#86EFAC">release to production</text>

  <!-- ===== Separator ===== -->
  <line x1="80" y1="448" x2="1120" y2="448" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Explanation row -->
  <rect x="80" y="468" width="1040" height="52" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="600" y="500" text-anchor="middle" font-size="15" fill="#94A3B8">One hook file. Three enforcement levels. No bypasses.</text>

  <!-- Hook file callout -->
  <rect x="80" y="540" width="1040" height="52" rx="8" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="600" y="572" text-anchor="middle" font-size="14" fill="#64748B" class="mono">.claude/hooks/git-push-gate.sh</text>

</svg>
