<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#0F172A"/>

  <!-- Header -->
  <text x="600" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#F1F5F9">Four checks across two hooks</text>
  <text x="600" y="80" text-anchor="middle" font-size="16" fill="#94A3B8">Local checks run every prompt. Remote checks run on push.</text>

  <!-- Divider -->
  <line x1="60" y1="100" x2="1140" y2="100" stroke="#1E293B" stroke-width="1.5"/>

  <!-- LOCAL label -->
  <rect x="60" y="106" width="530" height="24" rx="4" fill="#F59E0B10"/>
  <text x="325" y="123" text-anchor="middle" font-size="12" font-weight="600" fill="#F59E0B" letter-spacing="0.08em">LOCAL (wip-nudge.sh, every prompt)</text>

  <!-- REMOTE label -->
  <rect x="610" y="106" width="530" height="24" rx="4" fill="#3B82F610"/>
  <text x="875" y="123" text-anchor="middle" font-size="12" font-weight="600" fill="#3B82F6" letter-spacing="0.08em">REMOTE (push:watch, on push)</text>

  <!-- Check 1: Uncommitted changes -->
  <rect x="60" y="140" width="530" height="110" rx="10" fill="#1E293B" stroke="#F59E0B40" stroke-width="1.5"/>
  <rect x="60" y="140" width="530" height="36" rx="10" fill="#F59E0B15"/>
  <rect x="60" y="166" width="530" height="1" fill="#1E293B"/>
  <circle cx="84" cy="158" r="10" fill="#F59E0B30" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="84" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#F59E0B">1</text>
  <text x="104" y="163" font-size="14" font-weight="600" fill="#FDE68A">Uncommitted changes too large</text>
  <text x="80" y="195" font-size="13" fill="#94A3B8">Fires when:</text>
  <text x="168" y="195" font-size="13" fill="#F1F5F9" class="mono">insertions + deletions >= 200</text>
  <text x="80" y="218" font-size="12" fill="#94A3B8" class="mono">WIP: ~347 lines of uncommitted changes.</text>
  <text x="80" y="236" font-size="12" fill="#94A3B8" class="mono">Consider committing before continuing.</text>

  <!-- Check 2: Unpushed commits -->
  <rect x="60" y="270" width="530" height="110" rx="10" fill="#1E293B" stroke="#3B82F640" stroke-width="1.5"/>
  <rect x="60" y="270" width="530" height="36" rx="10" fill="#3B82F615"/>
  <rect x="60" y="296" width="530" height="1" fill="#1E293B"/>
  <circle cx="84" cy="288" r="10" fill="#3B82F630" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="84" y="293" text-anchor="middle" font-size="13" font-weight="700" fill="#3B82F6">2</text>
  <text x="104" y="293" font-size="14" font-weight="600" fill="#93C5FD">Unpushed commits piling up</text>
  <text x="80" y="325" font-size="13" fill="#94A3B8">Fires when:</text>
  <text x="168" y="325" font-size="13" fill="#F1F5F9" class="mono">origin/master..HEAD >= 3</text>
  <text x="80" y="348" font-size="12" fill="#94A3B8" class="mono">WIP: 5 unpushed commits on master.</text>
  <text x="80" y="366" font-size="12" fill="#94A3B8" class="mono">Consider running `npm run push:watch`.</text>

  <!-- Check 3: Missing changesets -->
  <rect x="610" y="140" width="530" height="110" rx="10" fill="#1E293B" stroke="#A855F740" stroke-width="1.5"/>
  <rect x="610" y="140" width="530" height="36" rx="10" fill="#A855F715"/>
  <rect x="610" y="166" width="530" height="1" fill="#1E293B"/>
  <circle cx="634" cy="158" r="10" fill="#A855F730" stroke="#A855F7" stroke-width="1.5"/>
  <text x="634" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#A855F7">3</text>
  <text x="654" y="163" font-size="14" font-weight="600" fill="#D8B4FE">Unreleased commits without changesets</text>
  <text x="630" y="195" font-size="13" fill="#94A3B8">Fires when:</text>
  <text x="718" y="195" font-size="12" fill="#F1F5F9" class="mono">no changeset AND (oldest > 24h OR count >= 3)</text>
  <text x="630" y="218" font-size="12" fill="#94A3B8" class="mono">WIP: 8 unreleased commits with no changeset</text>
  <text x="630" y="236" font-size="12" fill="#94A3B8" class="mono">(oldest: 3 day(s) ago). Run `npx changeset`.</text>

  <!-- Check 4: Stale release PR -->
  <rect x="610" y="270" width="530" height="120" rx="10" fill="#1E293B" stroke="#22C55E40" stroke-width="1.5"/>
  <rect x="610" y="270" width="530" height="36" rx="10" fill="#22C55E15"/>
  <rect x="610" y="296" width="530" height="1" fill="#1E293B"/>
  <circle cx="634" cy="288" r="10" fill="#22C55E30" stroke="#22C55E" stroke-width="1.5"/>
  <text x="634" y="293" text-anchor="middle" font-size="13" font-weight="700" fill="#22C55E">4</text>
  <text x="654" y="293" font-size="14" font-weight="600" fill="#86EFAC">Release PR accumulating work</text>
  <text x="630" y="325" font-size="13" fill="#94A3B8">Fires when:</text>
  <text x="718" y="325" font-size="12" fill="#F1F5F9" class="mono">PR to publish open >= 24h, shows diff size</text>
  <text x="630" y="348" font-size="12" fill="#94A3B8" class="mono">WIP: Release PR #42 open for 3 day(s),</text>
  <text x="630" y="364" font-size="11" fill="#94A3B8" class="mono">5 changeset(s), ~1200 lines. https://...</text>
  <text x="630" y="382" font-size="11" fill="#86EFAC" class="mono">CLAUDE: Ask the user if they want to merge.</text>

  <!-- Vertical divider between local and remote -->
  <line x1="600" y1="106" x2="600" y2="390" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Flow diagram at bottom -->
  <line x1="60" y1="410" x2="1140" y2="410" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Row 1: prompt-time -->
  <rect x="60" y="430" width="160" height="40" rx="8" fill="#1E293B" stroke="#F59E0B40" stroke-width="1.5"/>
  <text x="140" y="446" text-anchor="middle" font-size="10" fill="#94A3B8">every prompt</text>
  <text x="140" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#FDE68A">wip-nudge.sh</text>

  <line x1="220" y1="450" x2="248" y2="450" stroke="#475569" stroke-width="2"/>
  <polygon points="256,450 244,444 244,456" fill="#475569"/>

  <rect x="258" y="430" width="140" height="40" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="328" y="446" text-anchor="middle" font-size="10" fill="#94A3B8">checks 1-2</text>
  <text x="328" y="460" text-anchor="middle" font-size="10" fill="#94A3B8">local git only</text>

  <line x1="398" y1="450" x2="426" y2="450" stroke="#475569" stroke-width="2"/>
  <polygon points="434,450 422,444 422,456" fill="#475569"/>

  <rect x="436" y="430" width="170" height="40" rx="8" fill="#1E293B" stroke="#F59E0B40" stroke-width="1.5"/>
  <text x="521" y="446" text-anchor="middle" font-size="10" fill="#94A3B8">if any fire, emits</text>
  <text x="521" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#FDE68A">systemReminder</text>

  <!-- Row 2: push-time -->
  <rect x="60" y="486" width="160" height="40" rx="8" fill="#1E293B" stroke="#3B82F640" stroke-width="1.5"/>
  <text x="140" y="502" text-anchor="middle" font-size="10" fill="#94A3B8">after push</text>
  <text x="140" y="516" text-anchor="middle" font-size="12" font-weight="600" fill="#93C5FD">push:watch</text>

  <line x1="220" y1="506" x2="248" y2="506" stroke="#475569" stroke-width="2"/>
  <polygon points="256,506 244,500 244,512" fill="#475569"/>

  <rect x="258" y="486" width="140" height="40" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="328" y="502" text-anchor="middle" font-size="10" fill="#94A3B8">checks 3-4</text>
  <text x="328" y="516" text-anchor="middle" font-size="10" fill="#94A3B8">gh CLI + network</text>

  <line x1="398" y1="506" x2="426" y2="506" stroke="#475569" stroke-width="2"/>
  <polygon points="434,506 422,500 422,512" fill="#475569"/>

  <rect x="436" y="486" width="170" height="40" rx="8" fill="#1E293B" stroke="#3B82F640" stroke-width="1.5"/>
  <text x="521" y="502" text-anchor="middle" font-size="10" fill="#94A3B8">warnings printed to</text>
  <text x="521" y="516" text-anchor="middle" font-size="12" font-weight="600" fill="#93C5FD">stdout</text>

  <!-- Bracket: stubs from each row join a vertical bar, then one arrow out -->
  <line x1="606" y1="450" x2="625" y2="450" stroke="#475569" stroke-width="2"/>
  <line x1="606" y1="506" x2="625" y2="506" stroke="#475569" stroke-width="2"/>
  <line x1="625" y1="450" x2="625" y2="506" stroke="#475569" stroke-width="2"/>
  <line x1="625" y1="478" x2="654" y2="478" stroke="#475569" stroke-width="2"/>
  <polygon points="662,478 650,472 650,484" fill="#475569"/>

  <!-- Result box -->
  <rect x="666" y="458" width="210" height="40" rx="8" fill="#14532D" stroke="#22C55E40" stroke-width="1.5"/>
  <text x="771" y="474" text-anchor="middle" font-size="11" fill="#86EFAC">AI + human see the</text>
  <text x="771" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#86EFAC">state of things</text>

</svg>
