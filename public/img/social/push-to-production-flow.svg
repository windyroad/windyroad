<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  <rect x="0" y="0" width="1200" height="4" fill="#3B82F6"/>

  <!-- Header -->
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#F1F5F9">From push to production</text>
  <text x="600" y="76" text-anchor="middle" font-size="15" fill="#94A3B8">Hooks intercept commands. Scripts watch pipelines. URLs surface automatically.</text>

  <!-- ===== ROW 1: Push path ===== -->
  <text x="80" y="118" font-size="12" font-weight="600" fill="#64748B" letter-spacing="0.08em">PUSH PATH</text>

  <!-- git push -->
  <rect x="80" y="130" width="130" height="44" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="145" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#F1F5F9" class="mono">git push</text>

  <!-- Arrow -->
  <line x1="210" y1="152" x2="240" y2="152" stroke="#475569" stroke-width="2"/>
  <polygon points="248,152 236,146 236,158" fill="#475569"/>

  <!-- DENY badge -->
  <rect x="248" y="136" width="80" height="32" rx="16" fill="#EF444420" stroke="#EF444470" stroke-width="1.5"/>
  <text x="288" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#EF4444">DENY</text>

  <!-- Arrow -->
  <line x1="328" y1="152" x2="358" y2="152" stroke="#EF4444" stroke-width="2"/>
  <polygon points="366,152 354,146 354,158" fill="#EF4444"/>

  <!-- push:watch -->
  <rect x="366" y="130" width="160" height="44" rx="6" fill="#1E2940" stroke="#3B82F650" stroke-width="1.5"/>
  <text x="446" y="157" text-anchor="middle" font-size="13" font-weight="600" fill="#93C5FD" class="mono">push:watch</text>

  <!-- Arrow -->
  <line x1="526" y1="152" x2="556" y2="152" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="564,152 552,146 552,158" fill="#3B82F6"/>

  <!-- GitHub Actions -->
  <rect x="564" y="130" width="150" height="44" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="639" y="157" text-anchor="middle" font-size="13" fill="#E2E8F0">GitHub Actions</text>

  <!-- Arrow -->
  <line x1="714" y1="152" x2="744" y2="152" stroke="#475569" stroke-width="2"/>
  <polygon points="752,152 740,146 740,158" fill="#475569"/>

  <!-- Netlify deploy -->
  <rect x="752" y="130" width="150" height="44" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="827" y="157" text-anchor="middle" font-size="13" fill="#E2E8F0">Netlify deploy</text>

  <!-- Arrow -->
  <line x1="902" y1="152" x2="932" y2="152" stroke="#22C55E" stroke-width="2"/>
  <polygon points="940,152 928,146 928,158" fill="#22C55E"/>

  <!-- Preview URL -->
  <rect x="940" y="130" width="180" height="44" rx="6" fill="#14532D" stroke="#22C55E40" stroke-width="1.5"/>
  <text x="1030" y="152" text-anchor="middle" font-size="12" fill="#86EFAC">Preview URL</text>
  <text x="1030" y="166" text-anchor="middle" font-size="10" fill="#86EFAC90">surfaced in terminal</text>

  <!-- ===== ROW 2: Release path ===== -->
  <text x="80" y="218" font-size="12" font-weight="600" fill="#64748B" letter-spacing="0.08em">RELEASE PATH</text>

  <!-- gh pr merge -->
  <rect x="80" y="230" width="130" height="44" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="145" y="257" text-anchor="middle" font-size="13" font-weight="600" fill="#F1F5F9" class="mono">gh pr merge</text>

  <!-- Arrow -->
  <line x1="210" y1="252" x2="240" y2="252" stroke="#475569" stroke-width="2"/>
  <polygon points="248,252 236,246 236,258" fill="#475569"/>

  <!-- DENY badge -->
  <rect x="248" y="236" width="80" height="32" rx="16" fill="#EF444420" stroke="#EF444470" stroke-width="1.5"/>
  <text x="288" y="257" text-anchor="middle" font-size="12" font-weight="700" fill="#EF4444">DENY</text>

  <!-- Arrow -->
  <line x1="328" y1="252" x2="358" y2="252" stroke="#EF4444" stroke-width="2"/>
  <polygon points="366,252 354,246 354,258" fill="#EF4444"/>

  <!-- release:watch -->
  <rect x="366" y="230" width="160" height="44" rx="6" fill="#1E2940" stroke="#3B82F650" stroke-width="1.5"/>
  <text x="446" y="257" text-anchor="middle" font-size="13" font-weight="600" fill="#93C5FD" class="mono">release:watch</text>

  <!-- Arrow -->
  <line x1="526" y1="252" x2="556" y2="252" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="564,252 552,246 552,258" fill="#3B82F6"/>

  <!-- ASK badge -->
  <rect x="564" y="236" width="80" height="32" rx="16" fill="#F59E0B20" stroke="#F59E0B70" stroke-width="1.5"/>
  <text x="604" y="257" text-anchor="middle" font-size="12" font-weight="700" fill="#F59E0B">ASK</text>

  <!-- Arrow -->
  <line x1="644" y1="252" x2="674" y2="252" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="682,252 670,246 670,258" fill="#F59E0B"/>

  <!-- Human confirms -->
  <rect x="682" y="230" width="130" height="44" rx="6" fill="#1E293B" stroke="#F59E0B40" stroke-width="1.5"/>
  <text x="747" y="257" text-anchor="middle" font-size="13" fill="#FDE68A">Human confirms</text>

  <!-- Arrow -->
  <line x1="812" y1="252" x2="842" y2="252" stroke="#22C55E" stroke-width="2"/>
  <polygon points="850,252 838,246 838,258" fill="#22C55E"/>

  <!-- Merge + publish -->
  <rect x="850" y="230" width="270" height="44" rx="6" fill="#14532D" stroke="#22C55E40" stroke-width="1.5"/>
  <text x="985" y="252" text-anchor="middle" font-size="12" fill="#86EFAC">Merge release PR</text>
  <text x="985" y="266" text-anchor="middle" font-size="10" fill="#86EFAC90">publish pipeline runs, production URL surfaced</text>

  <!-- ===== Separator ===== -->
  <line x1="80" y1="302" x2="1120" y2="302" stroke="#1E293B" stroke-width="1.5"/>

  <!-- ===== Legend ===== -->
  <text x="80" y="334" font-size="12" font-weight="600" fill="#64748B" letter-spacing="0.08em">LEGEND</text>

  <!-- Deny -->
  <rect x="80" y="348" width="60" height="26" rx="13" fill="#EF444420" stroke="#EF444470" stroke-width="1.5"/>
  <text x="110" y="366" text-anchor="middle" font-size="11" font-weight="700" fill="#EF4444">DENY</text>
  <text x="154" y="366" font-size="12" fill="#94A3B8">Action blocked. AI rerouted to correct command.</text>

  <!-- Ask -->
  <rect x="80" y="386" width="60" height="26" rx="13" fill="#F59E0B20" stroke="#F59E0B70" stroke-width="1.5"/>
  <text x="110" y="404" text-anchor="middle" font-size="11" font-weight="700" fill="#F59E0B">ASK</text>
  <text x="154" y="404" font-size="12" fill="#94A3B8">Action paused. Human confirms before proceeding.</text>

  <!-- ===== System components ===== -->
  <text x="80" y="450" font-size="12" font-weight="600" fill="#64748B" letter-spacing="0.08em">SYSTEM COMPONENTS</text>

  <rect x="80" y="466" width="1040" height="140" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>

  <!-- Hook file -->
  <rect x="100" y="482" width="220" height="52" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="210" y="503" text-anchor="middle" font-size="11" fill="#64748B">Hook file</text>
  <text x="210" y="521" text-anchor="middle" font-size="12" fill="#93C5FD" class="mono">git-push-gate.sh</text>

  <!-- push:watch script -->
  <rect x="340" y="482" width="220" height="52" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="450" y="503" text-anchor="middle" font-size="11" fill="#64748B">Push script</text>
  <text x="450" y="521" text-anchor="middle" font-size="12" fill="#93C5FD" class="mono">push-watch.sh</text>

  <!-- release:watch script -->
  <rect x="580" y="482" width="220" height="52" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="690" y="503" text-anchor="middle" font-size="11" fill="#64748B">Release script</text>
  <text x="690" y="521" text-anchor="middle" font-size="12" fill="#93C5FD" class="mono">release-watch.sh</text>

  <!-- settings.json -->
  <rect x="820" y="482" width="280" height="52" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="960" y="503" text-anchor="middle" font-size="11" fill="#64748B">Wiring</text>
  <text x="960" y="521" text-anchor="middle" font-size="12" fill="#93C5FD" class="mono">.claude/settings.json</text>

  <!-- Connection note -->
  <text x="600" y="560" text-anchor="middle" font-size="12" fill="#64748B">One hook file intercepts all three commands. Two scripts watch the pipelines.</text>
  <text x="600" y="580" text-anchor="middle" font-size="12" fill="#64748B">The settings file wires the hook to PreToolUse on Bash.</text>

</svg>
