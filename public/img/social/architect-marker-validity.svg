<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <title>Marker validity: three checks before the gate opens</title>

  <!-- Background -->
  <rect width="1200" height="480" fill="#0F172A"/>

  <!-- Header -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#F1F5F9">Marker validity</text>
  <text x="600" y="64" text-anchor="middle" font-size="14" fill="#94A3B8">Three checks run before the gate allows an edit through.</text>

  <!-- Divider -->
  <line x1="40" y1="82" x2="1160" y2="82" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Entry: Edit attempt -->
  <rect x="40" y="130" width="160" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="120" y="155" text-anchor="middle" font-size="13" fill="#94A3B8">Edit attempt</text>
  <text x="120" y="175" text-anchor="middle" font-size="12" fill="#F1F5F9" class="mono">Edit / Write</text>

  <!-- Arrow to TTL check -->
  <line x1="200" y1="160" x2="250" y2="160" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Check 1: TTL -->
  <rect x="260" y="110" width="240" height="180" rx="12" fill="#1E293B" stroke="#F59E0B40" stroke-width="1.5"/>
  <rect x="260" y="110" width="240" height="36" rx="12" fill="#F59E0B15"/>
  <rect x="260" y="140" width="240" height="1" fill="#1E293B"/>
  <text x="380" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#F59E0B">1. TTL CHECK</text>

  <text x="280" y="170" font-size="12" fill="#CBD5E1">Marker age &lt; TTL?</text>
  <text x="280" y="190" font-size="11" fill="#F1F5F9" class="mono">ARCHITECT_TTL=600</text>
  <text x="280" y="214" font-size="12" fill="#CBD5E1">Default: 10 minutes.</text>

  <rect x="280" y="232" width="100" height="24" rx="6" fill="#22C55E20" stroke="#22C55E60" stroke-width="1"/>
  <text x="330" y="249" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">Fresh: next</text>

  <rect x="388" y="232" width="100" height="24" rx="6" fill="#EF444420" stroke="#EF444460" stroke-width="1"/>
  <text x="438" y="249" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">Stale: DENY</text>

  <!-- Stale path down to DENY -->
  <path d="M 438 256 L 438 340" stroke="#EF4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- Arrow to drift check -->
  <line x1="500" y1="160" x2="550" y2="160" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Check 2: Drift -->
  <rect x="560" y="110" width="240" height="180" rx="12" fill="#1E293B" stroke="#3B82F640" stroke-width="1.5"/>
  <rect x="560" y="110" width="240" height="36" rx="12" fill="#3B82F615"/>
  <rect x="560" y="140" width="240" height="1" fill="#1E293B"/>
  <text x="680" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#3B82F6">2. DRIFT CHECK</text>

  <text x="580" y="170" font-size="12" fill="#CBD5E1">Stored hash == current hash?</text>
  <text x="580" y="192" font-size="11" fill="#F1F5F9" class="mono">docs/decisions/*.md</text>
  <text x="580" y="214" font-size="12" fill="#CBD5E1">Any decision changed?</text>

  <rect x="580" y="232" width="100" height="24" rx="6" fill="#22C55E20" stroke="#22C55E60" stroke-width="1"/>
  <text x="630" y="249" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">Match: next</text>

  <rect x="688" y="232" width="100" height="24" rx="6" fill="#EF444420" stroke="#EF444460" stroke-width="1"/>
  <text x="738" y="249" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">Changed: DENY</text>

  <!-- Changed path down to DENY -->
  <path d="M 738 256 L 738 340" stroke="#EF4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- Arrow to sliding window -->
  <line x1="800" y1="160" x2="850" y2="160" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Check 3: Sliding window -->
  <rect x="860" y="110" width="300" height="180" rx="12" fill="#1E293B" stroke="#22C55E40" stroke-width="1.5"/>
  <rect x="860" y="110" width="300" height="36" rx="12" fill="#22C55E15"/>
  <rect x="860" y="140" width="300" height="1" fill="#1E293B"/>
  <text x="1010" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#22C55E">3. ALLOW + REFRESH</text>

  <text x="880" y="170" font-size="12" fill="#CBD5E1">Edit proceeds.</text>
  <text x="880" y="194" font-size="12" fill="#CBD5E1">Marker timestamp refreshed:</text>
  <text x="880" y="214" font-size="11" fill="#F1F5F9" class="mono">touch "$MARKER"</text>
  <text x="880" y="242" font-size="12" fill="#CBD5E1">Sliding window: next edit</text>
  <text x="880" y="260" font-size="12" fill="#CBD5E1">gets another 10 minutes.</text>

  <!-- DENY box at bottom -->
  <rect x="340" y="350" width="480" height="50" rx="8" fill="#EF444415" stroke="#EF444450" stroke-width="1.5"/>
  <text x="580" y="372" text-anchor="middle" font-size="14" font-weight="600" fill="#EF4444">DENY: Re-run architect before editing</text>
  <text x="580" y="390" text-anchor="middle" font-size="11" fill="#94A3B8">Marker removed. Gate locked until fresh PASS verdict.</text>

  <!-- Footer -->
  <line x1="40" y1="420" x2="1160" y2="420" stroke="#1E293B" stroke-width="1"/>
  <text x="600" y="448" text-anchor="middle" font-size="12" fill="#64748B">TTL prevents stale reviews. Drift detection catches decision changes. Sliding window keeps long sessions flowing.</text>
</svg>
