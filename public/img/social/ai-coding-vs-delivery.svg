<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ai-coding-delivery-title" aria-describedby="ai-coding-delivery-desc">
  <title id="ai-coding-delivery-title">AI sped up a coding task, while delivery outcomes were mixed</title>
  <desc id="ai-coding-delivery-desc">Two panels summarise different studies whose percentages are not directly comparable. In GitHub's controlled experiment with 95 professional developers doing one JavaScript task, Copilot users completed the task 55 percent faster and the completion rate rose from 70 percent without Copilot to 78 percent with it. In DORA's 2024 organisational research, each 25 percent rise in AI adoption was associated with 7.5 percent better documentation, 3.4 percent better code quality, 3.1 percent faster reviews, 1.5 percent lower delivery throughput and 7.2 percent lower delivery stability.</desc>

  <rect width="1200" height="630" fill="#0F172A"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="64" y="60" fill="#F8FAFC" font-size="35" font-weight="700">AI sped up a coding task. Delivery outcomes were mixed.</text>
    <text x="64" y="100" fill="#CBD5E1" font-size="19">Different studies and measures; percentages are not directly comparable.</text>

    <line x1="526" y1="132" x2="526" y2="532" stroke="#475569" stroke-width="2"/>

    <text x="64" y="154" fill="#7DD3FC" font-size="15" font-weight="700">CONTROLLED TASK | GITHUB</text>
    <text x="64" y="183" fill="#CBD5E1" font-size="17">95 professional developers, one JavaScript task</text>

    <text x="64" y="304" fill="#F8FAFC" font-size="88" font-weight="800">55%</text>
    <text x="64" y="337" fill="#7DD3FC" font-size="22" font-weight="700">faster task completion with Copilot</text>

    <text x="64" y="382" fill="#94A3B8" font-size="14" font-weight="700">TASK COMPLETION RATE</text>

    <text x="64" y="423" fill="#E2E8F0" font-size="16" font-weight="600">Without Copilot</text>
    <rect x="190" y="407" width="250" height="17" fill="#334155"/>
    <rect x="190" y="407" width="175" height="17" fill="#FBBF24"/>
    <rect x="359" y="401" width="12" height="29" fill="#FBBF24"/>
    <text x="379" y="423" fill="#FDE68A" font-size="18" font-weight="700">70%</text>

    <text x="64" y="474" fill="#E2E8F0" font-size="16" font-weight="600">With Copilot</text>
    <rect x="190" y="458" width="250" height="17" fill="#334155"/>
    <rect x="190" y="458" width="195" height="17" fill="#38BDF8"/>
    <rect x="379" y="452" width="12" height="29" fill="#38BDF8"/>
    <text x="399" y="474" fill="#7DD3FC" font-size="18" font-weight="700">78%</text>

    <text x="560" y="154" fill="#A7F3D0" font-size="15" font-weight="700">ORGANISATIONAL ASSOCIATIONS | DORA 2024</text>
    <text x="560" y="183" fill="#CBD5E1" font-size="17">Change linked to each 25% rise in AI adoption</text>

    <text x="846" y="215" fill="#FDA4AF" font-size="13" font-weight="700" text-anchor="middle">DECREASE</text>
    <text x="1024" y="215" fill="#7DD3FC" font-size="13" font-weight="700" text-anchor="middle">INCREASE</text>
    <line x1="934" y1="226" x2="934" y2="491" stroke="#E2E8F0" stroke-width="2"/>

    <g fill="#F8FAFC" font-size="17" font-weight="600">
      <text x="560" y="256">Documentation quality</text>
      <text x="560" y="310">Code quality</text>
      <text x="560" y="364">Review speed</text>
      <text x="560" y="418">Delivery throughput</text>
      <text x="560" y="472">Delivery stability</text>
    </g>

    <rect x="934" y="242" width="180" height="16" fill="#38BDF8"/>
    <rect x="1108" y="236" width="12" height="28" fill="#38BDF8"/>
    <text x="1130" y="257" fill="#7DD3FC" font-size="18" font-weight="700">+7.5%</text>

    <rect x="934" y="296" width="81.6" height="16" fill="#38BDF8"/>
    <rect x="1009.6" y="290" width="12" height="28" fill="#38BDF8"/>
    <text x="1031" y="311" fill="#7DD3FC" font-size="18" font-weight="700">+3.4%</text>

    <rect x="934" y="350" width="74.4" height="16" fill="#38BDF8"/>
    <rect x="1002.4" y="344" width="12" height="28" fill="#38BDF8"/>
    <text x="1024" y="365" fill="#7DD3FC" font-size="18" font-weight="700">+3.1%</text>

    <rect x="898" y="404" width="36" height="16" fill="#FB7185"/>
    <circle cx="898" cy="412" r="8" fill="#0F172A" stroke="#FB7185" stroke-width="5"/>
    <text x="883" y="419" fill="#FDA4AF" font-size="18" font-weight="700" text-anchor="end">-1.5%</text>

    <rect x="761.2" y="458" width="172.8" height="16" fill="#FB7185"/>
    <circle cx="761.2" cy="466" r="8" fill="#0F172A" stroke="#FB7185" stroke-width="5"/>
    <text x="746" y="473" fill="#FDA4AF" font-size="18" font-weight="700" text-anchor="end">-7.2%</text>

    <text x="934" y="516" fill="#CBD5E1" font-size="14" text-anchor="middle">0%</text>

    <text x="64" y="589" fill="#94A3B8" font-size="15">Sources: GitHub controlled experiment and Google Cloud DORA 2024. DORA figures are reported associations.</text>
  </g>
</svg>
