<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="940" viewBox="0 0 1200 940">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
    <marker id="a" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94A3B8"/>
    </marker>
    <marker id="ag" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#22C55E"/>
    </marker>
    <marker id="ar" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#EF4444"/>
    </marker>
  </defs>

  <!--
    LAYOUT GRID v4 (all weaknesses fixed)
    ======================================
    Canvas: 1200 x 960
    Center: x=500, boxes x=200..800 (w=600)
    Arrow gap: 36px
    Hook header: consistently at boxY+18
    Title: at boxY+40
    Subtitle: at boxY+58
    Footer: centered at x=500 (same as flow)
  -->

  <title>Architect gates: the full turn lifecycle</title>

  <!-- Background -->
  <rect width="1200" height="940" fill="#0F172A"/>

  <!-- Header -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#F1F5F9">How the architect gates work</text>
  <text x="600" y="78" text-anchor="middle" font-size="16" fill="#94A3B8">Every edit passes through this flow. No marker, no edit.</text>
  <line x1="60" y1="98" x2="1140" y2="98" stroke="#1E293B" stroke-width="1.5"/>

  <!-- ===== PROMPT (y=114, h=60) ===== -->
  <rect x="300" y="114" width="400" height="60" rx="30" fill="#334155" stroke="#64748B" stroke-width="1.5"/>
  <text x="500" y="138" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: UserPromptSubmit</text>
  <text x="500" y="160" text-anchor="middle" font-size="18" font-weight="600" fill="#F1F5F9">Prompt</text>

  <!-- Arrow -->
  <line x1="500" y1="174" x2="500" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== CONTAINER (y=210, h=510) ===== -->
  <rect x="80" y="210" width="1040" height="540" rx="16" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="500" y="236" text-anchor="middle" font-size="14" fill="#64748B">AI does stuff (edits, plans, reviews...)</text>

  <!-- ===== ATTEMPT (y=252, h=56) ===== -->
  <rect x="200" y="252" width="600" height="56" rx="10" fill="#1E293B" stroke="#64748B50" stroke-width="1.5"/>
  <text x="500" y="280" text-anchor="middle" font-size="15" fill="#F1F5F9" font-weight="500">Attempts Edit, Write, or ExitPlanMode</text>

  <!-- Arrow -->
  <line x1="500" y1="308" x2="500" y2="344" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== GATE CHECK (y=344, h=80) ===== -->
  <rect x="200" y="344" width="600" height="80" rx="10" fill="#1E293B" stroke="#F59E0B50" stroke-width="1.5"/>
  <text x="500" y="362" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: PreToolUse (Edit|Write|ExitPlanMode)</text>
  <text x="500" y="388" text-anchor="middle" font-size="17" font-weight="600" fill="#F59E0B">Gate check</text>
  <text x="500" y="410" text-anchor="middle" font-size="13" fill="#94A3B8">Marker exists? TTL valid? No drift?</text>

  <!-- [Fix #1: MARKER OK with 20px gap from box edge] -->
  <line x1="800" y1="384" x2="920" y2="384" stroke="#22C55E" stroke-width="2" marker-end="url(#ag)"/>
  <text x="860" y="374" text-anchor="middle" font-size="13" font-weight="600" fill="#22C55E">MARKER OK</text>

  <!-- Action proceeds -->
  <rect x="930" y="362" width="140" height="44" rx="10" fill="#22C55E15" stroke="#22C55E50" stroke-width="1.5"/>
  <text x="1000" y="381" text-anchor="middle" font-size="14" fill="#22C55E">Action</text>
  <text x="1000" y="398" text-anchor="middle" font-size="14" fill="#22C55E">proceeds</text>

  <!-- Loop: Action proceeds -> Attempts (label below arrow line) -->
  <path d="M 1000 362 L 1000 280 L 800 280" stroke="#22C55E" stroke-width="1.5" fill="none" marker-end="url(#ag)" stroke-dasharray="5,3"/>
  <text x="920" y="295" text-anchor="middle" font-size="11" fill="#22C55E">continues working</text>

  <!-- NO MARKER arrow -->
  <line x1="500" y1="424" x2="500" y2="460" stroke="#EF4444" stroke-width="2" marker-end="url(#ar)"/>
  <text x="544" y="448" font-size="13" font-weight="600" fill="#EF4444">NO MARKER</text>

  <!-- ===== DENY (y=460, h=48) [Fix #4: lighter fill, not black] ===== -->
  <rect x="200" y="460" width="600" height="48" rx="10" fill="#1E293B" stroke="#EF444460" stroke-width="1.5"/>
  <text x="500" y="490" text-anchor="middle" font-size="17" font-weight="600" fill="#EF4444">DENY</text>

  <!-- Arrow -->
  <line x1="500" y1="508" x2="500" y2="544" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== ARCHITECT AGENT (y=544, h=86) [Fix #6: title at x=500] ===== -->
  <rect x="200" y="544" width="600" height="86" rx="12" fill="#1E293B" stroke="#F59E0B50" stroke-width="2"/>
  <g transform="translate(290, 554) scale(0.85)">
    <polygon points="10,0 20,6 0,6" fill="#F59E0B" opacity="0.9"/>
    <rect x="1" y="6" width="18" height="2" fill="#F59E0B" opacity="0.7"/>
    <rect x="3" y="8" width="2" height="8" fill="#F59E0B" opacity="0.6"/>
    <rect x="9" y="8" width="2" height="8" fill="#F59E0B" opacity="0.6"/>
    <rect x="15" y="8" width="2" height="8" fill="#F59E0B" opacity="0.6"/>
    <rect x="0" y="16" width="20" height="2" fill="#F59E0B" opacity="0.7"/>
  </g>
  <text x="514" y="570" text-anchor="middle" font-size="17" font-weight="600" fill="#F59E0B">Architect agent reviews</text>
  <text x="500" y="596" text-anchor="middle" font-size="14" fill="#CBD5E1">Checks change against decisions in <tspan class="mono" fill="#F1F5F9">docs/decisions/</tspan></text>
  <text x="500" y="618" text-anchor="middle" font-size="13" fill="#94A3B8">Writes verdict file (PASS or FAIL)</text>

  <!-- Arrow -->
  <line x1="500" y1="630" x2="500" y2="666" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== READ VERDICT (y=666, h=64) [Fix #5: hook header at +18] ===== -->
  <rect x="200" y="666" width="600" height="64" rx="10" fill="#1E293B" stroke="#22C55E40" stroke-width="1.5"/>
  <text x="500" y="684" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: PostToolUse (Agent)</text>
  <text x="500" y="710" text-anchor="middle" font-size="15" font-weight="600" fill="#F1F5F9">Read verdict file</text>

  <!-- PASS: left loop (moved right for safe margin) -->
  <path d="M 200 698 L 140 698 L 140 280 L 200 280" stroke="#22C55E" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="122" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#22C55E" transform="rotate(-90, 122, 500)">PASS: marker created, retries</text>

  <!-- FAIL: right loop -->
  <path d="M 800 698 L 880 698 L 880 587 L 800 587" stroke="#EF4444" stroke-width="2" fill="none" marker-end="url(#ar)" stroke-dasharray="8,4"/>
  <text x="900" y="646" text-anchor="middle" font-size="13" font-weight="600" fill="#EF4444" transform="rotate(-90, 900, 646)">FAIL: fix, re-run</text>

  <!-- Container bottom: y=720 -->

  <!-- Arrow -->
  <line x1="500" y1="750" x2="500" y2="786" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== TURN ENDS (y=786, h=80) ===== -->
  <rect x="300" y="786" width="400" height="80" rx="40" fill="#334155" stroke="#64748B" stroke-width="1.5"/>
  <text x="500" y="804" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: Stop</text>
  <text x="500" y="830" text-anchor="middle" font-size="18" font-weight="600" fill="#F1F5F9">Turn ends</text>
  <text x="500" y="852" text-anchor="middle" font-size="12" fill="#94A3B8">Removes marker and hash (if they exist)</text>

  <!-- Footer -->
  <line x1="60" y1="890" x2="1140" y2="890" stroke="#1E293B" stroke-width="1"/>
  <text x="500" y="916" text-anchor="middle" font-size="13" fill="#64748B">Marker validity details (TTL, drift detection, sliding window) are shown in the next diagram.</text>
</svg>
