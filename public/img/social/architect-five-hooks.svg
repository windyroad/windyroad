<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1080" viewBox="0 0 1200 1080">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
    <marker id="a" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94A3B8"/>
    </marker>
    <marker id="ag" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#22C55E"/>
    </marker>
    <marker id="ar" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#EF4444"/>
    </marker>
  </defs>

  <title>Architect gates: the full turn lifecycle</title>

  <!-- Background -->
  <rect width="1200" height="1080" fill="#0F172A"/>

  <!-- Header: centered at x=600 -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#F1F5F9">How the architect gates work</text>
  <text x="600" y="78" text-anchor="middle" font-size="16" fill="#94A3B8">Every edit passes through this flow. No marker, no edit.</text>
  <line x1="60" y1="98" x2="1140" y2="98" stroke="#1E293B" stroke-width="1.5"/>

  <!--
    Layout grid:
    - Center axis: x=520 (shifted left to leave room for right-side elements)
    - Main boxes: 600px wide, x=220 to x=820
    - PASS loop: left gutter at x=160
    - MARKER OK / Action proceeds: right side x=830 to x=1050
    - FAIL loop: right gutter at x=920
    - Container: x=100 to x=1100
  -->

  <!-- ===== PROMPT ===== -->
  <rect x="320" y="120" width="400" height="60" rx="30" fill="#334155" stroke="#64748B" stroke-width="1.5"/>
  <text x="520" y="145" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: UserPromptSubmit</text>
  <text x="520" y="167" text-anchor="middle" font-size="18" font-weight="600" fill="#F1F5F9">Prompt</text>

  <line x1="520" y1="180" x2="520" y2="220" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== AI DOES STUFF ===== -->
  <rect x="100" y="230" width="1000" height="630" rx="16" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="520" y="260" text-anchor="middle" font-size="15" fill="#64748B">AI does stuff (edits, plans, reviews...)</text>

  <!-- ATTEMPT: 600px wide -->
  <rect x="220" y="284" width="600" height="50" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="520" y="315" text-anchor="middle" font-size="15" fill="#CBD5E1">Attempts Edit, Write, or ExitPlanMode</text>

  <line x1="520" y1="334" x2="520" y2="374" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- GATE CHECK: 600px wide -->
  <rect x="220" y="384" width="600" height="72" rx="10" fill="#1E293B" stroke="#F59E0B50" stroke-width="1.5"/>
  <text x="520" y="408" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: PreToolUse (Edit|Write|ExitPlanMode)</text>
  <text x="520" y="432" text-anchor="middle" font-size="17" font-weight="600" fill="#F59E0B">Gate check</text>
  <text x="520" y="448" text-anchor="middle" font-size="13" fill="#94A3B8">Marker exists? TTL valid? No drift?</text>

  <!-- ===== MARKER OK: right ===== -->
  <line x1="820" y1="420" x2="910" y2="420" stroke="#22C55E" stroke-width="2" marker-end="url(#ag)"/>
  <text x="865" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#22C55E">MARKER OK</text>

  <!-- Action proceeds -->
  <rect x="920" y="398" width="130" height="44" rx="10" fill="#22C55E15" stroke="#22C55E50" stroke-width="1.5"/>
  <text x="985" y="417" text-anchor="middle" font-size="14" fill="#22C55E">Action</text>
  <text x="985" y="434" text-anchor="middle" font-size="14" fill="#22C55E">proceeds</text>

  <!-- Loop: Action proceeds -> Attempts -->
  <path d="M 985 398 L 985 309 L 820 309" stroke="#22C55E" stroke-width="1.5" fill="none" marker-end="url(#ag)" stroke-dasharray="5,3"/>
  <text x="915" y="299" text-anchor="middle" font-size="11" fill="#22C55E">continues working</text>

  <!-- ===== NO MARKER: down ===== -->
  <line x1="520" y1="456" x2="520" y2="500" stroke="#EF4444" stroke-width="2" marker-end="url(#ar)"/>
  <text x="560" y="486" font-size="13" font-weight="600" fill="#EF4444">NO MARKER</text>

  <!-- DENY: 600px wide -->
  <rect x="220" y="510" width="600" height="44" rx="10" fill="#EF444415" stroke="#EF444450" stroke-width="1.5"/>
  <text x="520" y="538" text-anchor="middle" font-size="17" font-weight="600" fill="#EF4444">DENY</text>

  <line x1="520" y1="554" x2="520" y2="590" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- ARCHITECT AGENT: 600px wide -->
  <rect x="220" y="600" width="600" height="76" rx="12" fill="#1E293B" stroke="#F59E0B50" stroke-width="2"/>
  <g transform="translate(310, 608) scale(0.85)">
    <polygon points="10,0 20,6 0,6" fill="#F59E0B" opacity="0.9"/>
    <rect x="1" y="6" width="18" height="2" fill="#F59E0B" opacity="0.7"/>
    <rect x="3" y="8" width="2" height="8" fill="#F59E0B" opacity="0.6"/>
    <rect x="9" y="8" width="2" height="8" fill="#F59E0B" opacity="0.6"/>
    <rect x="15" y="8" width="2" height="8" fill="#F59E0B" opacity="0.6"/>
    <rect x="0" y="16" width="20" height="2" fill="#F59E0B" opacity="0.7"/>
  </g>
  <text x="530" y="624" text-anchor="middle" font-size="17" font-weight="600" fill="#F59E0B">Architect agent reviews</text>
  <text x="520" y="650" text-anchor="middle" font-size="14" fill="#CBD5E1">Checks change against decisions in <tspan class="mono" fill="#F1F5F9">docs/decisions/</tspan></text>
  <text x="520" y="670" text-anchor="middle" font-size="13" fill="#94A3B8">Writes verdict file (PASS or FAIL)</text>

  <line x1="520" y1="676" x2="520" y2="712" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- READ VERDICT: 600px wide -->
  <rect x="220" y="722" width="600" height="56" rx="10" fill="#1E293B" stroke="#22C55E40" stroke-width="1.5"/>
  <text x="520" y="744" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: PostToolUse (Agent)</text>
  <text x="520" y="766" text-anchor="middle" font-size="15" font-weight="600" fill="#F1F5F9">Read verdict file</text>

  <!-- PASS: left loop -->
  <path d="M 220 750 L 160 750 L 160 309 L 220 309" stroke="#22C55E" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="140" y="540" text-anchor="middle" font-size="13" font-weight="600" fill="#22C55E" transform="rotate(-90, 140, 540)">PASS: marker created, retries</text>

  <!-- FAIL: right loop -->
  <path d="M 820 750 L 920 750 L 920 638 L 820 638" stroke="#EF4444" stroke-width="2" fill="none" marker-end="url(#ar)" stroke-dasharray="8,4"/>
  <text x="940" y="698" text-anchor="middle" font-size="13" font-weight="600" fill="#EF4444" transform="rotate(-90, 940, 698)">FAIL: fix, re-run</text>

  <!-- ===== TURN ENDS ===== -->
  <!-- Arrow exits container (container bottom = 230+630 = 860) -->
  <line x1="520" y1="860" x2="520" y2="910" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>

  <!-- Turn ends pill: 400px wide, 76px tall for 3 lines of text -->
  <rect x="320" y="920" width="400" height="76" rx="38" fill="#334155" stroke="#64748B" stroke-width="1.5"/>
  <text x="520" y="946" text-anchor="middle" font-size="11" fill="#64748B" class="mono">hook: Stop</text>
  <text x="520" y="968" text-anchor="middle" font-size="18" font-weight="600" fill="#F1F5F9">Turn ends</text>
  <text x="520" y="986" text-anchor="middle" font-size="12" fill="#94A3B8">Removes marker and hash (if they exist)</text>

  <!-- Footer -->
  <line x1="60" y1="1024" x2="1140" y2="1024" stroke="#1E293B" stroke-width="1"/>
  <text x="600" y="1050" text-anchor="middle" font-size="13" fill="#64748B">Marker validity details (TTL, drift detection, sliding window) are shown in the next diagram.</text>
</svg>
