<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#0F172A"/>

  <text x="600" y="48" text-anchor="middle" font-size="21" font-weight="700" fill="#F1F5F9">What it looks like in practice</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#94A3B8">Claude Code blocks the tool call before the shell ever sees it</text>

  <!-- Window -->
  <rect x="80" y="88" width="1040" height="532" rx="10" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>
  <rect x="80" y="88" width="1040" height="36" rx="10" fill="#21262D"/>
  <rect x="80" y="106" width="1040" height="18" fill="#21262D"/>
  <circle cx="110" cy="106" r="6" fill="#FF5F57"/>
  <circle cx="132" cy="106" r="6" fill="#FEBC2E"/>
  <circle cx="154" cy="106" r="6" fill="#28C840"/>
  <text x="600" y="111" text-anchor="middle" font-size="12" fill="#6E7681" class="mono">Claude Code</text>

  <!-- TOOL CALL: git push — blocked -->
  <rect x="100" y="140" width="1000" height="48" rx="6" fill="#1C1010" stroke="#EF444440" stroke-width="1"/>
  <rect x="100" y="140" width="8" height="48" rx="3" fill="#EF4444"/>
  <text x="120" y="157" font-size="10" font-weight="600" fill="#EF444480" class="mono" letter-spacing="0.08em">TOOL CALL — Bash</text>
  <text x="120" y="177" font-size="14" fill="#FCA5A5" class="mono">git push</text>

  <!-- HOOK: denied -->
  <rect x="100" y="200" width="1000" height="58" rx="6" fill="#1A1500" stroke="#F59E0B40" stroke-width="1"/>
  <rect x="100" y="200" width="8" height="58" rx="3" fill="#F59E0B"/>
  <text x="120" y="217" font-size="10" font-weight="600" fill="#F59E0B80" class="mono" letter-spacing="0.08em">HOOK — PreToolUse — denied</text>
  <text x="120" y="237" font-size="13" fill="#FDE68A" class="mono">Use `npm run push:watch` instead. It pushes, watches the pipeline,</text>
  <text x="120" y="252" font-size="13" fill="#FDE68A" class="mono">and surfaces the preview URL so you can review before releasing.</text>

  <line x1="100" y1="272" x2="1100" y2="272" stroke="#21262D" stroke-width="1"/>

  <!-- TOOL CALL: push:watch -->
  <rect x="100" y="282" width="1000" height="48" rx="6" fill="#0C1810" stroke="#22C55E40" stroke-width="1"/>
  <rect x="100" y="282" width="8" height="48" rx="3" fill="#22C55E"/>
  <text x="120" y="299" font-size="10" font-weight="600" fill="#22C55E80" class="mono" letter-spacing="0.08em">TOOL CALL — Bash</text>
  <text x="120" y="319" font-size="14" fill="#86EFAC" class="mono">npm run push:watch</text>

  <!-- Output block -->
  <rect x="100" y="342" width="1000" height="266" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <!-- rebase output -->
  <text x="120" y="364" font-size="12" fill="#3FB950" class="mono">Successfully rebased and updated refs/heads/master.</text>
  <!-- git push -->
  <text x="120" y="382" font-size="12" fill="#8B949E" class="mono">To github.com:windyroad/windyroad.git</text>
  <text x="120" y="398" font-size="12" fill="#3FB950" class="mono">   4707c1d..973fb3f  master -&gt; master</text>

  <!-- Waiting -->
  <text x="120" y="420" font-size="12" fill="#8B949E" class="mono">Waiting for main-pipeline.</text>
  <text x="120" y="438" font-size="12" fill="#58A6FF" class="mono">Pipeline: https://github.com/windyroad/windyroad/actions/runs/22653062938</text>

  <!-- gh run watch output — real format: ✓ Job name in Xs -->
  <text x="120" y="460" font-size="12" fill="#3FB950" class="mono">✓ Dependency freshness in 39s</text>
  <text x="120" y="476" font-size="12" fill="#3FB950" class="mono">✓ Secrets scan in 14s</text>
  <text x="120" y="492" font-size="12" fill="#3FB950" class="mono">✓ Lint in 37s</text>
  <text x="120" y="508" font-size="12" fill="#3FB950" class="mono">✓ Build in 38s</text>
  <text x="120" y="524" font-size="12" fill="#3FB950" class="mono">✓ Accessibility gate in 47s</text>
  <text x="120" y="540" font-size="12" fill="#3FB950" class="mono">✓ Deploy draft + smoke test in 1m6s</text>
  <text x="120" y="556" font-size="12" fill="#3FB950" class="mono">✓ Create release PR in 34s</text>

  <line x1="120" y1="568" x2="1080" y2="568" stroke="#30363D" stroke-width="1"/>

  <text x="120" y="585" font-size="12" fill="#3FB950" class="mono">✓ Test deploy:  </text>
  <text x="248" y="585" font-size="12" fill="#58A6FF" class="mono">http://main-test--windyroad.netlify.app</text>
  <text x="120" y="601" font-size="12" fill="#8B949E" class="mono">  Release PR:   </text>
  <text x="248" y="601" font-size="12" fill="#58A6FF" class="mono">https://github.com/windyroad/windyroad/pull/5</text>
</svg>
