<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#0F172A"/>

  <text x="600" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#F1F5F9">What it looks like in practice</text>
  <text x="600" y="76" text-anchor="middle" font-size="15" fill="#94A3B8">Claude Code blocks the tool call before the shell ever sees it</text>

  <!-- Window -->
  <rect x="80" y="96" width="1040" height="520" rx="10" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>
  <rect x="80" y="96" width="1040" height="36" rx="10" fill="#21262D"/>
  <rect x="80" y="114" width="1040" height="18" fill="#21262D"/>
  <circle cx="110" cy="114" r="6" fill="#FF5F57"/>
  <circle cx="132" cy="114" r="6" fill="#FEBC2E"/>
  <circle cx="154" cy="114" r="6" fill="#28C840"/>
  <text x="600" y="119" text-anchor="middle" font-size="12" fill="#6E7681" class="mono">Claude Code</text>

  <!-- TOOL CALL: git push — blocked -->
  <rect x="100" y="148" width="1000" height="52" rx="6" fill="#1C1010" stroke="#EF444440" stroke-width="1"/>
  <rect x="100" y="148" width="8" height="52" rx="3" fill="#EF4444"/>
  <text x="120" y="166" font-size="11" font-weight="600" fill="#EF444480" class="mono" letter-spacing="0.08em">TOOL CALL — Bash</text>
  <text x="120" y="186" font-size="15" fill="#FCA5A5" class="mono">git push</text>

  <!-- HOOK: denied -->
  <rect x="100" y="212" width="1000" height="64" rx="6" fill="#1A1500" stroke="#F59E0B40" stroke-width="1"/>
  <rect x="100" y="212" width="8" height="64" rx="3" fill="#F59E0B"/>
  <text x="120" y="230" font-size="11" font-weight="600" fill="#F59E0B80" class="mono" letter-spacing="0.08em">HOOK — PreToolUse — denied</text>
  <text x="120" y="250" font-size="14" fill="#FDE68A" class="mono">Use `npm run push:watch` instead. It pushes, watches the pipeline,</text>
  <text x="120" y="268" font-size="14" fill="#FDE68A" class="mono">and surfaces the preview URL so you can review before releasing.</text>

  <line x1="100" y1="290" x2="1100" y2="290" stroke="#21262D" stroke-width="1"/>

  <!-- TOOL CALL: push:watch -->
  <rect x="100" y="302" width="1000" height="52" rx="6" fill="#0C1810" stroke="#22C55E40" stroke-width="1"/>
  <rect x="100" y="302" width="8" height="52" rx="3" fill="#22C55E"/>
  <text x="120" y="320" font-size="11" font-weight="600" fill="#22C55E80" class="mono" letter-spacing="0.08em">TOOL CALL — Bash</text>
  <text x="120" y="340" font-size="15" fill="#86EFAC" class="mono">npm run push:watch</text>

  <!-- Output block -->
  <rect x="100" y="366" width="1000" height="236" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <!-- pull rebase output -->
  <text x="120" y="390" font-size="13" fill="#8B949E" class="mono">Current branch master is up to date.</text>
  <!-- git push output -->
  <text x="120" y="410" font-size="13" fill="#8B949E" class="mono">To github.com:windyroad/windyroad.git</text>
  <text x="120" y="428" font-size="13" fill="#3FB950" class="mono">   abc1234..def5678  master -&gt; master</text>
  <!-- Waiting -->
  <text x="120" y="450" font-size="13" fill="#8B949E" class="mono">Waiting for main-pipeline</text>
  <text x="346" y="450" font-size="13" fill="#475569" class="mono">............</text>
  <text x="120" y="468" font-size="13" fill="#58A6FF" class="mono">Pipeline: https://github.com/windyroad/windyroad/actions/runs/22651133595</text>
  <!-- Checks -->
  <text x="120" y="490" font-size="13" fill="#3FB950" class="mono">✓ gate-lint</text>
  <text x="228" y="490" font-size="13" fill="#8B949E" class="mono"> 8s  </text>
  <text x="284" y="490" font-size="13" fill="#3FB950" class="mono">✓ gate-deps</text>
  <text x="393" y="490" font-size="13" fill="#8B949E" class="mono"> 6s  </text>
  <text x="449" y="490" font-size="13" fill="#3FB950" class="mono">✓ gate-secrets</text>
  <text x="590" y="490" font-size="13" fill="#8B949E" class="mono"> 4s</text>
  <text x="120" y="508" font-size="13" fill="#3FB950" class="mono">✓ build</text>
  <text x="196" y="508" font-size="13" fill="#8B949E" class="mono"> 42s</text>
  <text x="120" y="526" font-size="13" fill="#3FB950" class="mono">✓ gate-accessibility</text>
  <text x="330" y="526" font-size="13" fill="#8B949E" class="mono"> 28s  </text>
  <text x="396" y="526" font-size="13" fill="#3FB950" class="mono">✓ deploy-test</text>
  <text x="511" y="526" font-size="13" fill="#8B949E" class="mono"> 35s  </text>
  <text x="583" y="526" font-size="13" fill="#3FB950" class="mono">✓ release-pr</text>
  <text x="690" y="526" font-size="13" fill="#8B949E" class="mono"> 12s</text>

  <line x1="120" y1="540" x2="1080" y2="540" stroke="#30363D" stroke-width="1"/>

  <text x="120" y="560" font-size="13" fill="#3FB950" class="mono">✓ Test deploy:  </text>
  <text x="270" y="560" font-size="13" fill="#58A6FF" class="mono">https://main-test--windyroad.netlify.app</text>
  <text x="120" y="580" font-size="13" fill="#8B949E" class="mono">  Release PR:    </text>
  <text x="274" y="580" font-size="13" fill="#58A6FF" class="mono">https://github.com/windyroad/windyroad/pull/5</text>
</svg>
