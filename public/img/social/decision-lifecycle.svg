<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    </style>
    <marker id="a" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94A3B8"/>
    </marker>
    <marker id="ag" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#22C55E"/>
    </marker>
    <marker id="ay" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#F59E0B"/>
    </marker>
  </defs>

  <title>Decision lifecycle: proposed to accepted to deprecated or superseded</title>

  <!-- Background -->
  <rect width="1200" height="440" fill="#0F172A"/>

  <!-- Header -->
  <text x="600" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#F1F5F9">Decision lifecycle</text>
  <text x="600" y="72" text-anchor="middle" font-size="15" fill="#94A3B8">Status lives in the filename. Promotion is automated after 14 days in production.</text>
  <line x1="60" y1="92" x2="1140" y2="92" stroke="#1E293B" stroke-width="1.5"/>

  <!-- ===== PROPOSED (x=80, y=140, w=240, h=120) ===== -->
  <rect x="80" y="140" width="240" height="120" rx="12" fill="#1E293B" stroke="#3B82F650" stroke-width="2"/>
  <text x="200" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#3B82F6">proposed</text>
  <text x="200" y="196" text-anchor="middle" font-size="12" fill="#94A3B8" class="mono">001-foo.proposed.md</text>
  <text x="200" y="220" text-anchor="middle" font-size="13" fill="#CBD5E1">New decision.</text>
  <text x="200" y="238" text-anchor="middle" font-size="13" fill="#CBD5E1">Enforced by the gate.</text>

  <!-- Arrow: proposed -> stamped -->
  <line x1="320" y1="200" x2="396" y2="200" stroke="#94A3B8" stroke-width="2" marker-end="url(#a)"/>
  <text x="358" y="188" text-anchor="middle" font-size="11" fill="#94A3B8">ships</text>

  <!-- ===== STAMPED (x=400, y=140, w=240, h=120) ===== -->
  <rect x="400" y="140" width="240" height="120" rx="12" fill="#1E293B" stroke="#F59E0B50" stroke-width="2"/>
  <text x="520" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#F59E0B">stamped</text>
  <text x="520" y="196" text-anchor="middle" font-size="12" fill="#94A3B8" class="mono">first-released: 2026-03-06</text>
  <text x="520" y="220" text-anchor="middle" font-size="13" fill="#CBD5E1">In production.</text>
  <text x="520" y="238" text-anchor="middle" font-size="13" fill="#CBD5E1">14-day grace period.</text>

  <!-- Arrow: stamped -> accepted -->
  <line x1="640" y1="200" x2="716" y2="200" stroke="#22C55E" stroke-width="2" marker-end="url(#ag)"/>
  <text x="678" y="188" text-anchor="middle" font-size="11" fill="#22C55E">14 days</text>

  <!-- ===== ACCEPTED (x=720, y=140, w=240, h=120) ===== -->
  <rect x="720" y="140" width="240" height="120" rx="12" fill="#1E293B" stroke="#22C55E50" stroke-width="2"/>
  <text x="840" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#22C55E">accepted</text>
  <text x="840" y="196" text-anchor="middle" font-size="12" fill="#94A3B8" class="mono">001-foo.accepted.md</text>
  <text x="840" y="220" text-anchor="middle" font-size="13" fill="#CBD5E1">Production-validated.</text>
  <text x="840" y="238" text-anchor="middle" font-size="13" fill="#CBD5E1">Enforced by the gate.</text>

  <!-- Arrow: accepted -> superseded (down-right) -->
  <path d="M 900 260 L 900 310 L 996 310" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <text x="948" y="300" text-anchor="middle" font-size="11" fill="#94A3B8">replaced</text>

  <!-- Arrow: accepted -> deprecated (down-left) -->
  <path d="M 780 260 L 780 310 L 676 310" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <text x="728" y="300" text-anchor="middle" font-size="11" fill="#94A3B8">retired</text>

  <!-- ===== DEPRECATED (x=480, y=290, w=200, h=90) ===== -->
  <rect x="480" y="290" width="200" height="90" rx="12" fill="#1E293B" stroke="#64748B50" stroke-width="1.5"/>
  <text x="580" y="322" text-anchor="middle" font-size="17" font-weight="700" fill="#64748B">deprecated</text>
  <text x="580" y="348" text-anchor="middle" font-size="13" fill="#94A3B8">No longer relevant.</text>
  <text x="580" y="366" text-anchor="middle" font-size="13" fill="#94A3B8">Ignored by gate.</text>

  <!-- ===== SUPERSEDED (x=1000, y=290, w=200, h=90) ===== -->
  <rect x="1000" y="290" width="200" height="90" rx="12" fill="#1E293B" stroke="#64748B50" stroke-width="1.5"/>
  <text x="1100" y="322" text-anchor="middle" font-size="17" font-weight="700" fill="#64748B">superseded</text>
  <text x="1100" y="348" text-anchor="middle" font-size="13" fill="#94A3B8">Replaced by a newer</text>
  <text x="1100" y="366" text-anchor="middle" font-size="13" fill="#94A3B8">decision. Ignored.</text>

  <!-- Footer -->
  <line x1="60" y1="400" x2="1140" y2="400" stroke="#1E293B" stroke-width="1"/>
  <text x="600" y="426" text-anchor="middle" font-size="13" fill="#64748B">The release hook handles proposed-to-stamped and stamped-to-accepted transitions. Deprecation and supersession are manual.</text>
</svg>
