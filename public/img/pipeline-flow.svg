<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 672" role="img" aria-label="Two-column swimlane diagram. Left column: your actions — commit, push, then human review and merge. Right column: automated steps — pre-commit hook, pre-push hook, CI quality gates, build and test deploy, release PR with preview environment, publish pipeline, and production.">
  <defs>
    <marker id="am" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#475569"/></marker>
    <marker id="ab" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#3B82F6"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#22C55E"/></marker>
  </defs>
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .col { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; }
    .ttl { font-size: 12px; font-weight: 600; }
    .sub { font-size: 11px; }
    .nte { font-size: 10px; font-style: italic; }
    .htl { font-size: 15px; font-weight: 700; }
  </style>

  <!-- Lane backgrounds -->
  <rect x="0"   y="0" width="240" height="672" fill="rgba(255,255,255,0.025)"/>
  <rect x="240" y="0" width="460" height="672" fill="rgba(59,130,246,0.035)"/>

  <!-- Column headers -->
  <rect x="0"   y="0" width="240" height="44" fill="rgba(255,255,255,0.07)"/>
  <rect x="240" y="0" width="460" height="44" fill="rgba(59,130,246,0.18)"/>
  <text x="120" y="27" class="col" fill="#94A3B8" text-anchor="middle">YOU</text>
  <text x="470" y="27" class="col" fill="#93C5FD" text-anchor="middle">AUTOMATED</text>

  <!-- Vertical divider + outer border -->
  <line x1="240" y1="0" x2="240" y2="672" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="0" y="0" width="700" height="672" rx="8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>


  <!-- ══ ROW A  y=56  h=56 ══ -->

  <rect x="10"  y="56" width="218" height="56" rx="5"
        fill="rgba(255,255,255,0.05)" stroke="#334155" stroke-width="1"/>
  <text x="26" y="74"  class="ttl" fill="#94A3B8">Commit</text>
  <text x="26" y="89"  class="sub" fill="#64748B">AI writes code, tests + changeset</text>

  <line x1="228" y1="84" x2="248" y2="84" stroke="#475569" stroke-width="1" marker-end="url(#am)"/>

  <rect x="252" y="56" width="436" height="56" rx="5"
        fill="rgba(59,130,246,0.09)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="268" y="74"  class="ttl" fill="#93C5FD">pre-commit hook</text>
  <text x="268" y="89"  class="sub" fill="#94A3B8">secrets scan · lint staged files</text>

  <!-- Down arrows A→B (12px gap) -->
  <line x1="120" y1="112" x2="120" y2="124" stroke="#475569" stroke-width="1" marker-end="url(#am)"/>
  <line x1="470" y1="112" x2="470" y2="124" stroke="#3B82F6" stroke-width="1" marker-end="url(#ab)"/>


  <!-- ══ ROW B  y=124  h=56 ══ -->

  <rect x="10"  y="124" width="218" height="56" rx="5"
        fill="rgba(255,255,255,0.05)" stroke="#334155" stroke-width="1"/>
  <text x="26" y="142" class="ttl" fill="#94A3B8">Push</text>
  <text x="26" y="157" class="sub" fill="#64748B">npm run push:watch</text>

  <line x1="228" y1="152" x2="248" y2="152" stroke="#475569" stroke-width="1" marker-end="url(#am)"/>

  <rect x="252" y="124" width="436" height="56" rx="5"
        fill="rgba(59,130,246,0.09)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="268" y="142" class="ttl" fill="#93C5FD">pre-push hook</text>
  <text x="268" y="157" class="sub" fill="#94A3B8">lint · unit tests</text>

  <!-- Down arrow B→C -->
  <line x1="470" y1="180" x2="470" y2="192" stroke="#3B82F6" stroke-width="1" marker-end="url(#ab)"/>


  <!-- ══ ROW C  y=192  h=72 ══ -->

  <rect x="252" y="192" width="436" height="72" rx="5"
        fill="rgba(59,130,246,0.09)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="268" y="210" class="ttl" fill="#93C5FD">main-pipeline quality gates — all parallel, all must pass</text>
  <text x="268" y="225" class="sub" fill="#94A3B8">lint · unit tests · coverage · accessibility · secrets scan</text>
  <text x="268" y="241" class="nte" fill="#64748B">dependency check  ·  any failure stops the pipeline</text>

  <!-- Down arrow C→D -->
  <line x1="470" y1="264" x2="470" y2="276" stroke="#3B82F6" stroke-width="1" marker-end="url(#ab)"/>


  <!-- ══ ROW D  y=276  h=56 ══ -->

  <rect x="252" y="276" width="436" height="56" rx="5"
        fill="rgba(59,130,246,0.09)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="268" y="294" class="ttl" fill="#93C5FD">Build Docker image  →  deploy bbstats-test  →  smoke tests</text>
  <text x="268" y="309" class="nte" fill="#64748B">image signed with cosign — provenance tied to this workflow run</text>

  <!-- Down arrow D→E -->
  <line x1="470" y1="332" x2="470" y2="344" stroke="#3B82F6" stroke-width="1" marker-end="url(#ab)"/>


  <!-- ══ ROW E  y=344  h=72 ══ -->

  <rect x="252" y="344" width="436" height="72" rx="5"
        fill="rgba(59,130,246,0.09)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="268" y="362" class="ttl" fill="#93C5FD">Pipeline creates release PR  (changesets)</text>
  <text x="268" y="377" class="sub" fill="#94A3B8">Deploys bbstats-release-preview · smoke tests</text>
  <text x="268" y="393" class="nte" fill="#64748B">health check · 401 unauthenticated · business logic assertions</text>

  <!-- AUTO → YOU handoff: L-path down + left into F -->
  <path d="M470,416 L470,422 L120,422 L120,428" fill="none"
        stroke="#3B82F6" stroke-width="1.5" marker-end="url(#ab)"/>


  <!-- ══ ROW F  y=428  h=92  HUMAN REVIEW ══ -->
  <!-- Subtle highlight across YOU lane for this row -->
  <rect x="1" y="428" width="238" height="92" fill="rgba(59,130,246,0.07)"/>

  <rect x="10" y="428" width="218" height="92" rx="6"
        fill="rgba(59,130,246,0.18)" stroke="#3B82F6" stroke-width="2"/>
  <text x="119" y="452" class="htl"  fill="#93C5FD" text-anchor="middle">HUMAN REVIEW</text>
  <text x="119" y="472" class="sub"  fill="#E2E8F0" text-anchor="middle">Open preview. Use the app.</text>
  <text x="119" y="490" class="sub"  fill="#93C5FD" text-anchor="middle" font-weight="600">Merge when satisfied.</text>

  <!-- YOU → AUTO handoff: L-path down + right into G -->
  <path d="M120,520 L120,526 L470,526 L470,532" fill="none"
        stroke="#3B82F6" stroke-width="1.5" marker-end="url(#ab)"/>


  <!-- ══ ROW G  y=532  h=72 ══ -->

  <rect x="252" y="532" width="436" height="72" rx="5"
        fill="rgba(59,130,246,0.09)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="268" y="550" class="ttl" fill="#93C5FD">publish-pipeline</text>
  <text x="268" y="565" class="sub" fill="#94A3B8">cosign verify · build prod image · deploy bbstats-prod</text>
  <text x="268" y="581" class="nte" fill="#64748B">same image you reviewed is exactly what ships</text>

  <!-- Down arrow G→H -->
  <line x1="470" y1="604" x2="470" y2="616" stroke="#22C55E" stroke-width="1" marker-end="url(#ag)"/>


  <!-- ══ ROW H  y=616  h=44 ══ -->

  <rect x="252" y="616" width="436" height="44" rx="5"
        fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.5)" stroke-width="1.5"/>
  <text x="470" y="642" class="ttl" fill="#86EFAC" text-anchor="middle">Production live</text>

</svg>
