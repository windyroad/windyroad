<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 920" role="img" aria-label="Pipeline flow diagram showing local hooks, automated CI gates, release PR with preview environment, human review decision point, publish pipeline, and production deployment">

  <defs>
    <marker id="arr-muted" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arr-blue-lg" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22C55E"/>
    </marker>
  </defs>

  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .lbl  { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; }
    .ttl  { font-size: 12.5px; font-weight: 600; }
    .bod  { font-size: 11.5px; }
    .nte  { font-size: 10.5px; font-style: italic; }
    .htl  { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }
    .hbd  { font-size: 12px; }
  </style>

  <!-- ─── BOX 1: LOCAL HOOKS ─── -->
  <text x="20" y="16" class="lbl" fill="#64748B">LOCAL</text>
  <rect x="20" y="22" width="660" height="80" rx="6"
        fill="rgba(255,255,255,0.04)" stroke="#374151" stroke-width="1.5"/>
  <text x="36" y="44" class="ttl" fill="#94A3B8">pre-commit</text>
  <text x="130" y="44" class="bod" fill="#64748B">  secrets scan · lint staged TypeScript files</text>
  <text x="36" y="64" class="ttl" fill="#94A3B8">pre-push</text>
  <text x="114" y="64" class="bod" fill="#64748B">  lint · unit tests · obligation gate · dep check · WIP size</text>
  <text x="36" y="88" class="nte" fill="#475569">npm run push:watch — pushes then tails the CI pipeline run in your terminal</text>

  <!-- arrow → 2 -->
  <line x1="350" y1="102" x2="350" y2="122" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-muted)"/>

  <!-- ─── BOX 2: CI QUALITY GATES ─── -->
  <text x="20" y="138" class="lbl" fill="#3B82F6">AUTOMATED — main-pipeline (GitHub Actions)</text>
  <rect x="20" y="144" width="660" height="92" rx="6"
        fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="36" y="166" class="ttl" fill="#93C5FD">Quality gates — all run in parallel, all must pass</text>
  <text x="36" y="185" class="bod" fill="#94A3B8">lint · unit tests · app coverage · accessibility · secrets scan · dep security</text>
  <text x="36" y="203" class="bod" fill="#94A3B8">workbook parity · migration contract · architecture drift · cloud policy · push size</text>
  <text x="36" y="224" class="nte" fill="#475569">If any gate fails the pipeline stops — no deployment, no release PR</text>

  <!-- arrow → 3 -->
  <line x1="350" y1="236" x2="350" y2="256" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ─── BOX 3: BUILD + TEST DEPLOY ─── -->
  <rect x="20" y="260" width="660" height="68" rx="6"
        fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="36" y="281" class="bod" fill="#94A3B8">Build Docker image  →  deploy <tspan class="ttl" fill="#93C5FD">bbstats-test</tspan> (Cloud Run, public)  →  smoke tests</text>
  <text x="36" y="300" class="nte" fill="#475569">Image signed with cosign (keyless OIDC) — provenance tied to this workflow run</text>
  <text x="36" y="318" class="nte" fill="#475569">Proves the candidate is deployable before any release work starts</text>

  <!-- arrow → 4 -->
  <line x1="350" y1="328" x2="350" y2="348" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ─── BOX 4: SUBMIT RELEASE PR ─── -->
  <rect x="20" y="352" width="660" height="74" rx="6"
        fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="36" y="374" class="ttl" fill="#93C5FD">Pipeline creates (or updates) release PR via changesets</text>
  <text x="36" y="393" class="bod" fill="#94A3B8"><tspan class="ttl">branch:</tspan>  changeset-release/publish  →  publish</text>
  <text x="36" y="411" class="bod" fill="#94A3B8"><tspan class="ttl">PR contains:</tspan>  version bump · CHANGELOG · all unreleased changesets the AI wrote</text>

  <!-- arrow → 5 -->
  <line x1="350" y1="426" x2="350" y2="446" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ─── BOX 5: RELEASE PR PREVIEW ─── -->
  <rect x="20" y="450" width="660" height="88" rx="6"
        fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="36" y="472" class="ttl" fill="#93C5FD">release-pr-preview workflow</text>
  <text x="36" y="491" class="bod" fill="#94A3B8">Build candidate image (cosign signed)  →  deploy <tspan class="ttl" fill="#93C5FD">bbstats-release-preview</tspan> (public URL)</text>
  <text x="36" y="510" class="bod" fill="#94A3B8">Smoke tests: /health SHA · 401 unauthenticated · business logic assertions</text>
  <text x="36" y="528" class="nte" fill="#475569">PR check status reported — PR is not mergeable until smoke tests pass</text>

  <!-- THICK arrow → 6 (the human decision) -->
  <line x1="350" y1="538" x2="350" y2="566" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arr-blue-lg)"/>

  <!-- ─── BOX 6: HUMAN REVIEW ★ ─── -->
  <rect x="20" y="570" width="660" height="108" rx="6"
        fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="2"/>
  <text x="350" y="598" class="htl" fill="#93C5FD" text-anchor="middle">HUMAN REVIEW</text>
  <text x="350" y="620" class="hbd" fill="#E2E8F0" text-anchor="middle">Open bbstats-release-preview in your browser. Use the actual app.</text>
  <text x="350" y="640" class="hbd" fill="#E2E8F0" text-anchor="middle">Check the things that matter — the things AI might have broken subtly.</text>
  <text x="350" y="662" class="hbd" fill="#93C5FD" text-anchor="middle" font-weight="600">Merge the PR when satisfied. Nothing ships without this step.</text>

  <!-- arrow → 7 -->
  <line x1="350" y1="678" x2="350" y2="698" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ─── BOX 7: PUBLISH PIPELINE ─── -->
  <text x="20" y="714" class="lbl" fill="#3B82F6">AUTOMATED — publish-pipeline (triggered by PR merge to publish)</text>
  <rect x="20" y="720" width="660" height="94" rx="6"
        fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="36" y="742" class="bod" fill="#94A3B8">Cosign verify image provenance  ·  re-run quality gates</text>
  <text x="36" y="761" class="bod" fill="#94A3B8">Deploy <tspan class="ttl" fill="#93C5FD">bbstats-release</tspan> (private Cloud Run)  →  verify</text>
  <text x="36" y="780" class="bod" fill="#94A3B8">Deploy <tspan class="ttl" fill="#93C5FD">bbstats-prod</tspan> (public)  →  smoke tests  →  verify readiness</text>
  <text x="36" y="802" class="nte" fill="#475569">Same image digest, verified at every step — what you reviewed is exactly what ships</text>

  <!-- arrow → 8 -->
  <line x1="350" y1="814" x2="350" y2="836" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ─── BOX 8: PRODUCTION ─── -->
  <rect x="20" y="840" width="660" height="62" rx="6"
        fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.5)" stroke-width="1.5"/>
  <text x="350" y="866" class="ttl" fill="#86EFAC" text-anchor="middle">Production live</text>
  <text x="350" y="887" class="bod" fill="#64748B" text-anchor="middle">publish branch automatically merged back to main</text>

</svg>
