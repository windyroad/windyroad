<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title description">
  <title id="title">Matching k6 load test reduced p95 search latency on OpenSearch 2.19</title>
  <desc id="description">Horizontal bars compare the same 38-minute k6 load-test profile. OpenSearch 1.3 recorded 962 milliseconds p95 search latency. OpenSearch 2.19 recorded 219 milliseconds, below the 1,443 millisecond acceptance limit.</desc>

  <rect width="1200" height="520" fill="#15191a"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="62" fill="#f6f8f8" font-size="34" font-weight="700">The matching load test cut p95 latency by 77%</text>
    <text x="60" y="100" fill="#c5ced0" font-size="20">Same 38-minute k6 profile, ramping from 5 to 20 virtual users</text>

    <g stroke="#687276" stroke-width="1.5">
      <line x1="300" y1="145" x2="300" y2="385"/>
      <line x1="567" y1="145" x2="567" y2="385"/>
      <line x1="833" y1="145" x2="833" y2="385"/>
      <line x1="1100" y1="145" x2="1100" y2="385"/>
    </g>
    <g fill="#c5ced0" font-size="17" text-anchor="middle">
      <text x="300" y="418">0</text>
      <text x="567" y="418">500</text>
      <text x="833" y="418">1,000</text>
      <text x="1100" y="418">1,500 ms</text>
    </g>

    <line x1="1070" y1="133" x2="1070" y2="390" stroke="#f6f8f8" stroke-width="3" stroke-dasharray="9 7"/>
    <text x="1055" y="129" fill="#f6f8f8" font-size="18" font-weight="700" text-anchor="end">Acceptance limit: 1,443 ms</text>

    <text x="60" y="212" fill="#f6f8f8" font-size="21" font-weight="700">OpenSearch 1.3</text>
    <text x="60" y="238" fill="#c5ced0" font-size="18">t3.small</text>
    <rect x="300" y="180" width="513" height="62" fill="#f2a65a"/>
    <text x="832" y="219" fill="#f6f8f8" font-size="22" font-weight="700">962 ms</text>

    <text x="60" y="322" fill="#f6f8f8" font-size="21" font-weight="700">OpenSearch 2.19</text>
    <text x="60" y="348" fill="#c5ced0" font-size="18">m6g.large</text>
    <rect x="300" y="290" width="117" height="62" fill="#4fd1c5"/>
    <text x="436" y="329" fill="#f6f8f8" font-size="22" font-weight="700">219 ms</text>

    <text x="60" y="478" fill="#c5ced0" font-size="17">p95 application-level search latency</text>
    <text x="1140" y="478" fill="#c5ced0" font-size="17" text-anchor="end">Lower is better</text>
  </g>
</svg>
