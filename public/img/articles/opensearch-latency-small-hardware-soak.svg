<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title description">
  <title id="title">OpenSearch 2.19 latency worsened during a soak on the same small hardware as OpenSearch 1.3</title>
  <desc id="description">Two line charts show four hourly CloudWatch SearchLatency readings while both OpenSearch versions run on t3.small hardware. OpenSearch 1.3 remains steady. OpenSearch 2.19 p90 rises from 1,156 to 2,753 milliseconds and p99 ends at 8,403 milliseconds.</desc>

  <rect width="1200" height="800" fill="#15191a"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="58" fill="#f6f8f8" font-size="34" font-weight="700">On the same small hardware, latency worsened</text>
    <text x="60" y="94" fill="#c5ced0" font-size="20">Both clusters ran on t3.small (2 GB); OpenSearch 2.19 did not warm toward parity.</text>

    <g font-size="19">
      <line x1="60" y1="132" x2="105" y2="132" stroke="#f2a65a" stroke-width="5" stroke-dasharray="12 8"/>
      <circle cx="82" cy="132" r="7" fill="#15191a" stroke="#f2a65a" stroke-width="4"/>
      <text x="120" y="139" fill="#f6f8f8">OpenSearch 1.3 on t3.small</text>
      <line x1="460" y1="132" x2="505" y2="132" stroke="#ff8a80" stroke-width="5"/>
      <rect x="477" y="125" width="14" height="14" fill="#ff8a80"/>
      <text x="520" y="139" fill="#f6f8f8">OpenSearch 2.19 on the same t3.small</text>
    </g>

    <text x="60" y="188" fill="#f6f8f8" font-size="26" font-weight="700">p90 latency</text>
    <g stroke="#687276" stroke-width="1.5">
      <line x1="170" y1="210" x2="1080" y2="210"/>
      <line x1="170" y1="260" x2="1080" y2="260"/>
      <line x1="170" y1="310" x2="1080" y2="310"/>
      <line x1="170" y1="360" x2="1080" y2="360"/>
    </g>
    <g fill="#c5ced0" font-size="17" text-anchor="end">
      <text x="155" y="216">3,000 ms</text>
      <text x="155" y="266">2,000</text>
      <text x="155" y="316">1,000</text>
      <text x="155" y="366">0</text>
    </g>
    <g fill="#c5ced0" font-size="18" text-anchor="middle">
      <text x="230" y="393">Hour 1</text>
      <text x="500" y="393">Hour 2</text>
      <text x="770" y="393">Hour 3</text>
      <text x="1040" y="393">Hour 4</text>
    </g>
    <path d="M230 348 L500 353 L770 350 L1040 348" fill="none" stroke="#f2a65a" stroke-width="5" stroke-dasharray="12 8"/>
    <path d="M230 302 L500 296 L770 233 L1040 222" fill="none" stroke="#ff8a80" stroke-width="5"/>
    <g fill="#15191a" stroke="#f2a65a" stroke-width="4">
      <circle cx="230" cy="348" r="7"/><circle cx="500" cy="353" r="7"/><circle cx="770" cy="350" r="7"/><circle cx="1040" cy="348" r="7"/>
    </g>
    <g fill="#ff8a80">
      <rect x="223" y="295" width="14" height="14"/><rect x="493" y="289" width="14" height="14"/><rect x="763" y="226" width="14" height="14"/><rect x="1033" y="215" width="14" height="14"/>
    </g>
    <g fill="#f6f8f8" font-size="19" font-weight="700">
      <text x="250" y="292">1,156 ms</text>
      <text x="1025" y="210" text-anchor="end">2.19: 2,753 ms</text>
      <text x="1025" y="340" text-anchor="end">1.3: 242 ms</text>
    </g>

    <text x="60" y="455" fill="#f6f8f8" font-size="26" font-weight="700">p99 latency</text>
    <g stroke="#687276" stroke-width="1.5">
      <line x1="170" y1="480" x2="1080" y2="480"/>
      <line x1="170" y1="530" x2="1080" y2="530"/>
      <line x1="170" y1="580" x2="1080" y2="580"/>
      <line x1="170" y1="630" x2="1080" y2="630"/>
    </g>
    <g fill="#c5ced0" font-size="17" text-anchor="end">
      <text x="155" y="486">9,000 ms</text>
      <text x="155" y="536">6,000</text>
      <text x="155" y="586">3,000</text>
      <text x="155" y="636">0</text>
    </g>
    <g fill="#c5ced0" font-size="18" text-anchor="middle">
      <text x="230" y="673">Hour 1</text>
      <text x="500" y="673">Hour 2</text>
      <text x="770" y="673">Hour 3</text>
      <text x="1040" y="673">Hour 4</text>
    </g>
    <path d="M230 623 L500 626 L770 623 L1040 624" fill="none" stroke="#f2a65a" stroke-width="5" stroke-dasharray="12 8"/>
    <path d="M230 543 L500 525 L770 529 L1040 490" fill="none" stroke="#ff8a80" stroke-width="5"/>
    <g fill="#15191a" stroke="#f2a65a" stroke-width="4">
      <circle cx="230" cy="623" r="7"/><circle cx="500" cy="626" r="7"/><circle cx="770" cy="623" r="7"/><circle cx="1040" cy="624" r="7"/>
    </g>
    <g fill="#ff8a80">
      <rect x="223" y="536" width="14" height="14"/><rect x="493" y="518" width="14" height="14"/><rect x="763" y="522" width="14" height="14"/><rect x="1033" y="483" width="14" height="14"/>
    </g>
    <g fill="#f6f8f8" font-size="19" font-weight="700">
      <text x="250" y="533">5,213 ms</text>
      <text x="1025" y="478" text-anchor="end">2.19: 8,403 ms</text>
      <text x="1025" y="616" text-anchor="end">1.3: 365 ms</text>
    </g>

    <text x="60" y="740" fill="#c5ced0" font-size="17">Hourly CloudWatch domain-side SearchLatency percentiles</text>
    <text x="1140" y="740" fill="#c5ced0" font-size="17" text-anchor="end">Lower is better</text>
  </g>
</svg>
